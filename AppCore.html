<script>
/**
 * ============================================================================
 * APPCORE - MAESTRO DA ORQUESTRAÇÃO V5
 * ============================================================================
 */
const { createApp, ref, onMounted, computed } = Vue;

const app = createApp({
  setup() {
    const currentView = ref('cockpit'); 
    const status = ref('Iniciando...');
    const isLoading = ref(true);
    const isMobile = ref(false);
    const isCollapsed = ref(true); 

    const handleResize = () => {
      isMobile.value = window.innerWidth < 1024;
      if (isMobile.value) isCollapsed.value = true;
    };

    const db = ref({
      cockpit: [], 
      // Garante que o Agregador existe antes de chamar, evitando erros se carregar fora de ordem
      resumoGerencial: typeof Agregador !== 'undefined' ? Agregador._gerarSumarioVazio() : {},
      config: {}, 
      configRaw: [], 
      ativos: [],
      scannerOportunidades: [],
      scannerTendencias: [],
      logs: []
    });

    const dynamicSummaryData = computed(() => {
      const s = db.value.resumoGerencial;
      const cfg = db.value.config;
      const fullMapeamento = [
        { id: 'PREMIO_PM', val: s.somas?.premioPm, type: 'currency' },
        { id: 'PREMIO_ATUAL', val: s.somas?.premioAtual, type: 'currency' },
        { id: 'GANHO_MAXIMO', val: s.somas?.ganhoMaximo, type: 'currency' },
        { id: 'NOCIONAL', val: s.somas?.nocional, type: 'currency' },
        { id: 'PL_TOTAL_PCT', val: s.somas?.plTotalPct, type: 'percentage' },
        { id: 'PL_ATUAL', val: s.somas?.plTotalRs, type: 'currency' },
        { id: 'DTE_CORRIDOS', val: s.medias?.dte, type: 'num' },
        { id: 'IV_CURRENT', val: s.medias?.ivCurrent, type: 'percentage' },
        { id: 'DELTA', val: s.somas?.delta, type: 'num' },
        { id: 'GAMMA', val: s.somas?.gamma, type: 'num' },
        { id: 'VEGA', val: s.somas?.vega, type: 'num' },
        { id: 'THETA', val: s.somas?.theta, type: 'currency' },
        { id: 'RHO', val: s.somas?.rho, type: 'num' }
      ];

      return fullMapeamento
        .map(m => {
          const show = cfg[`SHOW_${m.id}`], label = cfg[`LABEL_${m.id}`], order = cfg[`ORDER_${m.id}`];
          return { 
            key: m.id, label: label || m.id.replace(/_/g, ' '), 
            active: String(show).toUpperCase() === 'TRUE', 
            order: parseInt(order) || 999, value: m.val, type: m.type 
          };
        })
        .filter(m => m.active).sort((a, b) => a.order - b.order);
    });

    const sincronizarDashboard = (isBackground = false) => {
      if (!isBackground) {
        status.value = 'Sincronizando...';
        isLoading.value = true; 
      }

      // Proteção: Só tenta sincronizar se o Google Script Runner existir
      if (typeof google === 'undefined' || typeof google.script === 'undefined') {
          console.warn("Ambiente local detectado. Simulação de dados pode ser inserida aqui.");
          isLoading.value = false;
          return;
      }

      google.script.run.withSuccessHandler(res => {
        if (res && res.success) {
          try {
            const rawCockpit = res.raw['Cockpit'] ? res.raw['Cockpit'].slice(9) : [];
            const cockpitLimpo = typeof Tradutor !== 'undefined' ? Tradutor.processar(rawCockpit, 'COCKPIT') : [];
            const rawTendencia = res.raw['Dados_Ativos_Historico_Tendencia'] || [];
            const tendenciaLimpa = typeof Tradutor !== 'undefined' ? Tradutor.processar(rawTendencia, 'TENDENCIAS') : [];
            
            cockpitLimpo.forEach(op => {
              const tecnico = tendenciaLimpa.find(t => t.ticker === op.ticker);
              if (tecnico) Object.assign(op, tecnico);
            });

            db.value.cockpit = cockpitLimpo;
            db.value.resumoGerencial = typeof Agregador !== 'undefined' ? Agregador.processarSumario(cockpitLimpo) : {};
            
            db.value.configRaw = typeof Tradutor !== 'undefined' ? Tradutor.processar(res.raw['Config_Global'] || [], 'GLOBAL', true) : [];
            db.value.configRaw.forEach(item => { 
               if (item.chave) db.value.config[item.chave.trim().toUpperCase()] = item.valor; 
            });
            
            const rawAtivos = res.raw['Dados_Ativos'] || [];
            db.value.ativos = typeof Tradutor !== 'undefined' ? rawAtivos.slice(1).map(r => ({ 
               ticker: r[0], name: r[2], close: Tradutor._limparNumero(r[7]) 
            })) : [];

            db.value.scannerOportunidades = typeof Tradutor !== 'undefined' ? Tradutor.processar(res.raw['Scanner_Oportunidades'] || [], 'GLOBAL') : [];
            db.value.scannerTendencias = typeof Tradutor !== 'undefined' ? Tradutor.processar(res.raw['Scanner_Tendencia_Oportunidades'] || [], 'TENDENCIAS') : [];
            db.value.logs = typeof Tradutor !== 'undefined' ? Tradutor.processar(res.raw['Logs'] || [], 'GLOBAL', true) : [];

            status.value = 'Online';
          } catch (e) { console.error("❌ Erro no Processamento:", e); }
          finally { isLoading.value = false; }
        }
      }).withFailureHandler(err => {
          status.value = 'Falha';
          isLoading.value = false;
      }).getInitialData();
    };

    const getComponentProps = (compConfig) => {
      const base = { isMobile: isMobile.value, isLoading: isLoading.value, ...compConfig.props };
      const stats = db.value.resumoGerencial;

      const customs = {
        'ticker-tape': { ativos: db.value.ativos },
        'card-summary': { summaryData: dynamicSummaryData.value, statsPreCalculados: stats },
        'card-distrib-moneyness': { statsPreCalculados: stats },
        'card-vencimentos': { statsPreCalculados: stats },
        'card-concentracao': { statsPreCalculados: stats },
        'card-resultado': { statsPreCalculados: stats },
        'carousel-ativas': { operations: stats.listaAtivas || [] },
        'cockpit-table': { statsPreCalculados: stats, columns: compConfig.props?.columns || [] },
        'scanner-view': { dadosOportunidades: db.value.scannerOportunidades, dadosTendencias: db.value.scannerTendencias },
        'automation-view': { logs: db.value.logs },
        'log-console': { logs: db.value.logs },
        'settings-view': { configItems: db.value.configRaw }
      };
      return { ...base, ...(customs[compConfig.component] || {}) };
    };

    let timerAtualizacao = null;
    const isOrquestrando = ref(false); 
    const isAutoSyncEnabled = ref(false);
    const timerVisual = ref(15 * 60); 

    const toggleAutoSync = () => {
      isAutoSyncEnabled.value = !isAutoSyncEnabled.value;
      if (isAutoSyncEnabled.value) {
        timerAtualizacao = setInterval(rodarOrquestradorEAtualizar, 15 * 60 * 1000);
      } else {
        clearInterval(timerAtualizacao);
        timerAtualizacao = null;
      }
    };

    const rodarOrquestradorEAtualizar = () => {
      if (isOrquestrando.value) return;
      isOrquestrando.value = true; 
      
      if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler(() => {
              sincronizarDashboard(true); 
              isOrquestrando.value = false; 
              timerVisual.value = 15 * 60;  
            })
            .withFailureHandler(() => { isOrquestrando.value = false; })
            .executarFluxoSequencial();
      } else {
          isOrquestrando.value = false;
      }
    };

    onMounted(() => {
      handleResize();
      window.addEventListener('resize', handleResize);
      sincronizarDashboard();

      setInterval(() => {
        if (isAutoSyncEnabled.value && document.visibilityState === 'visible' && !isOrquestrando.value) {
          if (timerVisual.value > 0) timerVisual.value--;
          else rodarOrquestradorEAtualizar();
        }
      }, 1000);
    });

    const menu = ref(typeof APP_MENU !== 'undefined' ? APP_MENU : []);
    const currentLayout = computed(() => {
        if (typeof LAYOUT_MAP !== 'undefined') return LAYOUT_MAP[currentView.value] || [];
        return [];
    });

    // Lógica de Fatiamento (Para a Esteira Mobile)
    const carouselNames = typeof MOBILE_ORCHESTRATOR_CONFIG !== 'undefined' ? MOBILE_ORCHESTRATOR_CONFIG.sequence.map(s => s.component) : [];

    const topGridComponents = computed(() => {
      const layoutBase = currentLayout.value;
      if (!isMobile.value || typeof MOBILE_ORCHESTRATOR_CONFIG === 'undefined' || !MOBILE_ORCHESTRATOR_CONFIG.enabled || currentView.value !== 'cockpit') return layoutBase;
      const firstIndex = layoutBase.findIndex(comp => carouselNames.includes(comp.component));
      return firstIndex === -1 ? layoutBase : layoutBase.slice(0, firstIndex);
    });

    const mobileCarouselComponents = computed(() => {
      if (!isMobile.value || typeof MOBILE_ORCHESTRATOR_CONFIG === 'undefined' || !MOBILE_ORCHESTRATOR_CONFIG.enabled || currentView.value !== 'cockpit') return [];
      return MOBILE_ORCHESTRATOR_CONFIG.sequence.map(item => {
        const orig = currentLayout.value.find(c => c.component === item.component) || {};
        return { ...orig, id: item.id, component: item.component, isCarouselItem: true };
      });
    });

    const bottomGridComponents = computed(() => {
      if (!isMobile.value || typeof MOBILE_ORCHESTRATOR_CONFIG === 'undefined' || !MOBILE_ORCHESTRATOR_CONFIG.enabled || currentView.value !== 'cockpit') return [];
      const layoutBase = currentLayout.value;
      const firstIndex = layoutBase.findIndex(comp => carouselNames.includes(comp.component));
      if (firstIndex === -1) return [];
      return layoutBase.slice(firstIndex).filter(comp => !carouselNames.includes(comp.component));
    });

    return {
      currentView, status, db, dynamicSummaryData, isMobile, isLoading,
      isOrquestrando, isAutoSyncEnabled, timerVisual, toggleAutoSync,
      formatCountdown: (segundos) => `${Math.floor(segundos / 60)}:${(segundos % 60).toString().padStart(2, '0')}`,
      navigate: (v) => { currentView.value = v; if (isMobile.value) isCollapsed.value = true; },
      getComponentProps, toggleSidebar: () => { isCollapsed.value = !isCollapsed.value; },
      isCollapsed, menu, topGridComponents, mobileCarouselComponents, bottomGridComponents,
      currentMenuLabel: computed(() => { const i = menu.value.find(m => m.id === currentView.value); return i ? i.label : 'Dashboard'; })
    };
  }
});

// Registro Dinâmico e Seguro de Componentes
// Ele só tenta registrar o componente se a variável global dele já existir no escopo.
const globalComponents = [
  { name: 'menu-sidebar', obj: typeof MenuSidebar !== 'undefined' ? MenuSidebar : null }, 
  { name: 'settings-view', obj: typeof SettingsView !== 'undefined' ? SettingsView : null }, 
  { name: 'automation-view', obj: typeof AutomationView !== 'undefined' ? AutomationView : null },
  { name: 'comparativo-view', obj: typeof ComparativoView !== 'undefined' ? ComparativoView : null }, 
  { name: 'necton-import', obj: typeof NectonImport !== 'undefined' ? NectonImport : null }, 
  { name: 'gestao-ativos', obj: typeof GestaoAtivos !== 'undefined' ? GestaoAtivos : null },
  { name: 'gestao-ativos-sidebar', obj: typeof GestaoAtivosSidebar !== 'undefined' ? GestaoAtivosSidebar : null }, 
  { name: 'log-console', obj: typeof LogConsole !== 'undefined' ? LogConsole : null }, 
  { name: 'card-summary', obj: typeof CardSummary !== 'undefined' ? CardSummary : null }, 
  { name: 'card-distrib-moneyness', obj: typeof CardDistribMoneyness !== 'undefined' ? CardDistribMoneyness : null },
  { name: 'card-vencimentos', obj: typeof CardVencimentos !== 'undefined' ? CardVencimentos : null }, 
  { name: 'card-concentracao', obj: typeof CardConcentracao !== 'undefined' ? CardConcentracao : null },
  { name: 'card-resultado', obj: typeof CardResultado !== 'undefined' ? CardResultado : null }, 
  { name: 'carousel-ativas', obj: typeof CarouselAtivas !== 'undefined' ? CarouselAtivas : null },
  { name: 'cockpit-table', obj: typeof CockpitTable !== 'undefined' ? CockpitTable : null }, 
  { name: 'ticker-tape', obj: typeof TickerTape !== 'undefined' ? TickerTape : null },
  { name: 'scanner-view', obj: typeof ScannerView !== 'undefined' ? ScannerView : null },
  { name: 'consultoria-view', obj: typeof ConsultoriaView !== 'undefined' ? ConsultoriaView : null }, 
  { name: 'bancodedados-view', obj: typeof BancoDeDadosView !== 'undefined' ? BancoDeDadosView : null }
];

globalComponents.forEach(comp => {
    if (comp.obj) {
        app.component(comp.name, comp.obj);
    } else {
        console.warn(`⏳ Componente [${comp.name}] ainda não carregado ou ausente.`);
    }
});

app.mount('#app');
</script>

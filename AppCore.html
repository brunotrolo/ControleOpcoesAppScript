<script>
// ============================================================================
// APPCORE - MAESTRO V5 (NÚCLEO DE ORQUESTRAÇÃO, ESTADO E UI)
// ============================================================================

const { createApp, ref, computed, onMounted, provide } = Vue;

const app = createApp({
    setup() {
        // ====================================================================
        // 1. ESTADO GLOBAL REATIVO (Single Source of Truth)
        // ====================================================================
        const db = ref({ cockpit: [], resumoGerencial: { timestamp: '--:--' }, configGlobal: {}, dadosAtivos: [], necton: [], calcGreeks: [], historico250d: [] }); 
        const cuboOlap = ref(window.Agregador ? window.Agregador._gerarCuboVazio() : {});

        const isLoading = ref(true);
        const hasError = ref(false);
        const errorMessage = ref('');
        const lastSync = ref('');
        const status = ref('Iniciando...'); // Legado UI

        // ====================================================================
        // 2. CHASSI ORIGINAL: ROTEAMENTO E MENU
        // ====================================================================
        const currentView = ref('cockpit'); 
        const isCollapsed = ref(true); 
        
        const toggleSidebar = () => { 
            isCollapsed.value = !isCollapsed.value;
            // Recria os ícones do Lucide após a transição do menu
            setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 310);
        };

        const navigate = (viewName) => {
            currentView.value = viewName;
            if (isMobile.value) isCollapsed.value = true; // Auto-close no mobile
            setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
        };

        // ====================================================================
        // 3. CHASSI ORIGINAL: SENSOR MOBILE E FATIAMENTO
        // ====================================================================
        const isMobile = ref(false);

        const handleResize = () => {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isMobileHardware = /android|ipad|iphone|ipod/i.test(userAgent.toLowerCase());
            const isSmallScreen = window.innerWidth <= 1024; 
            
            isMobile.value = isMobileHardware || isSmallScreen;
            if (isMobile.value) isCollapsed.value = true;
        };

        window.addEventListener('resize', handleResize);

        // Simulando as variáveis de layout fatiado que seu Index.html espera
        const topGridComponents = computed(() => isMobile.value ? ['card-summary', 'card-vencimentos'] : []);
        const mobileCarouselComponents = computed(() => isMobile.value ? ['carousel-ativas'] : []);
        const bottomGridComponents = computed(() => isMobile.value ? ['card-concentracao'] : []);

        const getMobileLayoutZones = computed(() => {
            if (window.LayoutConfig && window.LayoutConfig.MOBILE_ORCHESTRATOR_CONFIG) {
                return window.LayoutConfig.MOBILE_ORCHESTRATOR_CONFIG;
            }
            return { top: [], carousel: [], bottom: [] };
        });

        // ====================================================================
        // 4. CHASSI ORIGINAL: POLLING E SYNC
        // ====================================================================
        const timerVisual = ref(300); // 5 minutos padrão
        const isOrquestrando = ref(false);
        const isAutoSyncEnabled = ref(true);

        const toggleAutoSync = () => {
            isAutoSyncEnabled.value = !isAutoSyncEnabled.value;
        };

        const formatCountdown = computed(() => {
            const m = Math.floor(timerVisual.value / 60).toString().padStart(2, '0');
            const s = (timerVisual.value % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        });

        const dispararErro = (msg) => {
            console.error("[APP_CORE] " + msg);
            errorMessage.value = msg;
            hasError.value = true;
            isLoading.value = false;
        };

        // ====================================================================
        // 5. MOTOR DE SINCRONIZAÇÃO E PIPELINE ETL (V5)
        // ====================================================================
        const sincronizarDashboard = () => {
            isLoading.value = true;
            hasError.value = false;
            status.value = "Conectando ao Google Cloud...";
            
            google.script.run
                .withSuccessHandler((response) => {
                    if (!response || !response.success) {
                        handleFailure("Resposta da API inválida ou sem sucesso.");
                        return;
                    }

                    try {
                        status.value = "Harmonizando dados...";
                        // PASSO A: Camada Semântica (TRADUTOR)
                        const bancoTraduzido = window.Tradutor.processarBancoCompleto(response.raw);
                        db.value = bancoTraduzido;

                        status.value = "Calculando métricas OLAP...";
                        // PASSO B: Camada Analítica (AGREGADOR)
                        const stats = window.Agregador.processarSumario(db.value);
                        cuboOlap.value = stats;

                        // Finalização
                        lastSync.value = new Date().toLocaleTimeString();
                        status.value = "Dashboard Atualizado";
                        isLoading.value = false;
                        
                    } catch (err) {
                        console.error("FALHA CRÍTICA NO PIPELINE V5:", err);
                        handleFailure("Erro no processamento de dados: " + err.message);
                    }
                })
                .withFailureHandler((err) => handleFailure(err))
                .getInitialData(); // Rota Master no API.gs
        };

        const handleFailure = (err) => {
            console.error("Erro na Sincronização:", err);
            hasError.value = true;
            errorMessage.value = String(err);
            isLoading.value = false;
            status.value = "Falha na Sincronização";
        };

        // ====================================================================
        // 6. O DISPENSADOR DE PROPS (Dependency Injection V5)
        // ====================================================================
        const getComponentProps = (componentName) => {
            // Fallback absoluto para Loading ou Erro
            if (isLoading.value || !db.value) {
                return { 
                    isLoading: true, 
                    trades: [], 
                    stats: {}, 
                    statsPreCalculados: window.Agregador ? window.Agregador._gerarCuboVazio() : {} 
                };
            }

            const baseProps = { 
                isLoading: false, 
                lastSync: lastSync.value,
                configGlobais: db.value.configGlobal || {}
            };

            switch (componentName) {
                case 'CardSummary':
                    return { ...baseProps, statsPreCalculados: cuboOlap.value };
                case 'CockpitTable':
                    return { ...baseProps, trades: db.value.cockpit, resumoGlobal: cuboOlap.value.resumoGlobal };
                case 'CardVencimentos':
                    return { ...baseProps, distribuicao: cuboOlap.value.distribuicaoVencimentos };
                case 'CardConcentracao':
                    return { ...baseProps, concentracao: cuboOlap.value.concentracaoRisco };
                case 'CardMoneyness':
                    return { ...baseProps, stats: cuboOlap.value.moneynessStats };
                case 'CardResultado':
                    return { ...baseProps, stats: cuboOlap.value.performanceStats };
                case 'TickerTape':
                    return { ...baseProps, ativos: db.value.dadosAtivos };
                case 'ConsultoriaView':
                    return { 
                        ...baseProps, 
                        trades: db.value.cockpit, 
                        cuboOlap: cuboOlap.value, 
                        historico: db.value.historico250d 
                    };
                default:
                    return baseProps;
            }
        };

        // Opcional para Vue 3 puro: injeta a função globalmente na árvore DOM
        provide('getComponentProps', getComponentProps);

        // ====================================================================
        // 7. INICIALIZAÇÃO
        // ====================================================================
        onMounted(() => {
            console.log("🚀 [APPCORE V5] Iniciando Ignição do Sistema...");


            // 🔥 DISPARAR TESTES UNITÁRIOS ANTES DA SINCRONIZAÇÃO
            if (window.SuiteTestesV5) {
                window.SuiteTestesV5.run();
            }

            // Dispara a primeira carga de dados
            sincronizarDashboard();
            
            // Ativa o Lucide Icons se disponível
            if(window.lucide) window.lucide.createIcons();
        });

        // ====================================================================
        // 8. EXPOSIÇÃO PARA O TEMPLATE (Binding Final)
        // ====================================================================
        return {
            // Motor de Dados V5
            db, cuboOlap, isLoading, hasError, errorMessage, lastSync, status,
            sincronizarDashboard, getComponentProps, getMobileLayoutZones, formatCountdown,

            // Chassi de UI e Roteamento
            currentView, navigate, isCollapsed, toggleSidebar,
            isMobile, topGridComponents, mobileCarouselComponents, bottomGridComponents,
            
            // Polling e Automação
            timerVisual,  
            currentMenuLabel: computed(() => db.value.configGlobal?.uiLabelTitulo || 'Dashboard'), // Adicione esta linha
            menu: ref([]), // Adicione esta linha (vazia por enquanto para não crashar)
            isOrquestrando, isAutoSyncEnabled, toggleAutoSync
        };
    } // Fim do setup()
}); // Fim do createApp

// ============================================================================
// REGISTRO DE MICRO FRONT-ENDS E MONTAGEM
// ============================================================================
const COMPONENTES_V5 = [
  ['menu-sidebar', window.MenuSidebar],
  ['card-summary', window.CardSummary],
  ['card-vencimentos', window.CardVencimentos],
  ['card-concentracao', window.CardConcentracao],
  ['card-moneyness', window.CardMoneyness],
  ['card-resultado', window.CardResultado],
  ['cockpit-table', window.CockpitTable],
  ['ticker-tape', window.TickerTape],
  ['necton-import', window.NectonImport],
  ['consultoria-view', window.ConsultoriaView],
  ['scanner-view', window.ScannerView],
  ['gestao-ativos', window.GestaoAtivos],
  ['settings-view', window.SettingsView]
];

COMPONENTES_V5.forEach(([name, comp]) => {
    // 🛡️ TRAVA DE SEGURANÇA: Só acopla se o componente existir no escopo global
    if (comp) {
        app.component(name, comp);
    } else {
        console.error(`[CRÍTICO] Falha ao carregar Micro Front-end: <${name}>. Verifique se o arquivo HTML está incluído no Index.`);
    }
});

// Ignição Total
app.mount('#app');
</script>

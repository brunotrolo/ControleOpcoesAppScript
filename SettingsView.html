<template id="settings-view-template">
  <div :class="isMobile ? 'bg-slate-900 -mx-4 px-4 pt-4 pb-20' : 'max-w-[95%] mx-auto pb-16 mt-6'" class="font-sans animate-fade-in space-y-6 transition-colors duration-500">
    
    <div :class="isMobile ? 'bg-slate-800 border-slate-700 shadow-xl' : 'bg-white'" 
         class="premium-card px-6 py-5 md:px-8 md:py-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 z-10 relative transition-all">
      
      <div class="flex items-center gap-5">
        <div class="p-3 bg-indigo-50 text-brand-indigo rounded-2xl shadow-sm border border-indigo-100/50">
          <i data-lucide="settings" class="w-6 h-6"></i>
        </div>
        <div>
          <h2 :class="isMobile ? 'text-white' : 'text-slate-900'" class="text-xl md:text-2xl font-black tracking-tight">Configurações Globais</h2>
          <p class="text-slate-400 text-[10px] uppercase tracking-[0.25em] font-bold mt-1">Motor de Regras e Parâmetros</p>
        </div>
      </div>

      <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
        <div class="relative w-full md:w-72">
          <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"></span>
          <input v-model="searchQuery" type="text" placeholder="Buscar parâmetro..." 
                 :class="isMobile ? 'bg-slate-900 border-slate-700 text-slate-300 focus:bg-slate-800' : 'bg-slate-50 border-slate-200 text-slate-700 focus:bg-white'"
                 class="w-full text-sm font-medium rounded-full pl-11 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-indigo transition-all shadow-inner">
        </div>

        <button v-if="!isEditing" @click="startEdit" class="btn-action btn-action-primary w-full md:w-auto px-8 whitespace-nowrap"> 
          Editar Regras
        </button>
        <div v-else class="flex gap-2 w-full md:w-auto">
          <button @click="cancelEdit" :disabled="saving" class="btn-action flex-1 md:flex-none bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 disabled:opacity-50"> 
            Cancelar 
          </button>
          <button @click="saveChanges" :disabled="saving" class="btn-action btn-action-primary flex-1 md:flex-none disabled:opacity-50">
            <span v-if="saving" class="flex items-center justify-center gap-2">
              <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              Salvando...
            </span>
            <span v-else>Salvar Modificações</span>
          </button>
        </div>
      </div>
    </div>

    <div :class="isMobile ? 'bg-slate-800 border-slate-700 p-4' : 'bg-slate-50/80 p-8 shadow-inner'" class="premium-card min-h-[500px] transition-colors">
      
      <template v-if="isLoading">
        <div v-for="n in 2" :key="'skel-grp-'+n" class="mb-8 premium-card overflow-hidden animate-pulse border border-slate-200/50">
          <div class="bg-slate-200/50 h-16 border-b border-slate-200/50 px-8 py-5"></div>
          <div class="p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div v-for="i in 6" :key="'skel-item-'+i" class="h-24 bg-slate-100/50 rounded-2xl"></div>
          </div>
        </div>
      </template>

      <template v-else>
        
        <div v-if="Object.keys(filteredGroups).length === 0" 
             :class="isMobile ? 'bg-slate-900 border-slate-700' : 'bg-white border-slate-200'" 
             class="py-24 text-center border border-dashed rounded-[24px]">
          <span class="text-5xl block mb-4">📭</span>
          <h3 :class="isMobile ? 'text-slate-200' : 'text-slate-700'" class="text-lg font-black tracking-tight">Nenhum parâmetro encontrado</h3>
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2">Tente buscar por "Delta", "Lucro" ou "TRUE"</p>
        </div>

        <div v-for="(items, groupName) in filteredGroups" :key="groupName" 
             :class="isMobile ? 'bg-slate-900 border-slate-700' : 'bg-white'"
             class="mb-8 premium-card overflow-hidden transition-colors">
          
          <div :class="isMobile ? 'bg-slate-800 border-slate-700' : 'bg-slate-50/80 border-slate-100'" class="border-b px-6 py-5 flex items-center gap-3">
            <div class="h-2 w-2 rounded-full bg-brand-indigo"></div>
            <h3 :class="isMobile ? 'text-white' : 'text-slate-800'" class="font-black text-xs tracking-[0.2em] uppercase">{{ groupName }}</h3>
            <span :class="isMobile ? 'bg-slate-700 text-slate-300 border-slate-600' : 'bg-white text-slate-400 border-slate-100'" class="ml-auto text-[10px] font-bold px-3 py-1 rounded-full border shadow-sm">
              {{ items.length }} regras
            </span>
          </div>

          <div class="p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div v-for="item in items" :key="item.key" 
                 class="group relative flex flex-col justify-center min-h-[90px] p-5 rounded-2xl border border-transparent transition-all"
                 :class="[
                   isEditing ? (isMobile ? 'ring-1 ring-indigo-500/50 bg-indigo-900/20' : 'ring-1 ring-indigo-100 bg-indigo-50/20') : (isMobile ? 'hover:bg-slate-800/80' : 'hover:bg-slate-50/80')
                 ]">
              
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3 transition-colors group-hover:text-brand-indigo">
                {{ formatLabel(item.key) }}
              </label>

              <div v-if="item.type === 'boolean'" class="flex items-center h-[42px]">
                <button type="button" @click="item.value = !item.value" 
                        :class="item.value ? 'bg-brand-emerald shadow-sm' : (isMobile ? 'bg-slate-600' : 'bg-slate-300')"
                        class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-all duration-300 ease-in-out focus:outline-none"
                        :disabled="!isEditing">
                  <span :class="item.value ? 'translate-x-5' : 'translate-x-0'"
                        class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow-sm ring-0 transition duration-300 ease-in-out"></span>
                </button>
                <span class="ml-4 text-xs font-black tracking-widest uppercase" :class="item.value ? 'text-brand-emerald' : 'text-slate-400'">
                  {{ item.value ? 'ATIVADO' : 'DESATIVADO' }}
                </span>
              </div>

              <input v-else-if="isEditing" v-model="item.value" type="text" 
                     :class="isMobile ? 'bg-slate-800 border-slate-600 text-white focus:bg-slate-900' : 'bg-white border-slate-200 text-slate-800 focus:bg-white'"
                     class="text-sm font-mono-data font-bold px-4 py-2.5 rounded-xl w-full focus:outline-none focus:ring-2 focus:ring-brand-indigo focus:border-transparent transition-all shadow-sm">
              
              <span v-else :class="isMobile ? 'text-slate-300' : 'text-slate-800'" class="text-base font-mono-data font-bold h-[42px] flex items-center overflow-hidden text-ellipsis whitespace-nowrap" :title="item.value">
                {{ item.value === '' ? '---' : item.value }}
              </span>
              
            </div>
          </div>
        </div>

      </template> </div>
  </div>
</template>

<script>
window.SettingsView = {
  props: { 
    configItems: Array,
    isMobile: Boolean, // 📱 Antena recebida com sucesso
    isLoading: Boolean // 🚀 Antena recebida com sucesso
  },
  template: '#settings-view-template',
  data() {
    return {
      isEditing: false,
      saving: false,
      searchQuery: '',
      groupedItems: {} 
    };
  },
  mounted() {
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  },
  watch: {
    configItems: {
      immediate: true,
      handler(newVal) { this.mapearParaUI(newVal); }
    }
  },
  computed: {
    filteredGroups() {
      if (!this.searchQuery) return this.groupedItems;
      const query = this.searchQuery.toLowerCase();
      const result = {};
      for (const [groupName, items] of Object.entries(this.groupedItems)) {
        const filteredItems = items.filter(item => 
          item.key.toLowerCase().includes(query) || 
          String(item.value).toLowerCase().includes(query) ||
          groupName.toLowerCase().includes(query)
        );
        if (filteredItems.length > 0) {
          result[groupName] = filteredItems;
        }
      }
      return result;
    }
  },
  methods: {
    formatLabel(key) {
      return key.replace(/_/g, ' ');
    },

    mapearParaUI(dadosBrutos) {
      if (!dadosBrutos || !Array.isArray(dadosBrutos)) {
        this.groupedItems = {};
        return;
      }

      const newGroupedItems = {};
      let currentGroup = "Parâmetros Diversos"; 

      dadosBrutos.forEach(item => {
        const chave = String(item.CHAVE || '').trim();
        let valor = item.VALOR !== undefined ? item.VALOR : '';

        if (chave.startsWith('//') || chave.startsWith('---') || chave.startsWith('#')) {
          currentGroup = chave.replace(/[/|-]/g, '').trim() || "Nova Categoria";
          return; 
        }

        if (!chave) return;

        let tipo = 'text';
        if (String(valor).toUpperCase() === 'TRUE' || String(valor).toUpperCase() === 'FALSE') {
          tipo = 'boolean';
          valor = String(valor).toUpperCase() === 'TRUE';
        }

        if (!newGroupedItems[currentGroup]) {
          newGroupedItems[currentGroup] = [];
        }

        newGroupedItems[currentGroup].push({
          key: chave,
          value: valor,
          type: tipo
        });
      });

      this.groupedItems = newGroupedItems;
    },

    startEdit() { this.isEditing = true; },
    cancelEdit() {
      this.isEditing = false;
      this.searchQuery = ''; 
      this.mapearParaUI(this.configItems); 
    },
    
    saveChanges() {
      const self = this;
      self.saving = true;
      const payload = {};
      
      Object.values(this.groupedItems).forEach(group => {
        group.forEach(item => {
          let valToSave = item.value;
          if (item.type === 'boolean') {
            valToSave = item.value ? 'TRUE' : 'FALSE';
          }
          payload[item.key] = valToSave;
        });
      });

      if (typeof google !== 'undefined') {
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.success) {
              self.saving = false;
              self.isEditing = false;
              self.$emit('refresh'); 
            } else {
              self.saving = false;
              alert("❌ Erro ao salvar: " + (res.error || res.message));
            }
          })
          .withFailureHandler((err) => {
            self.saving = false;
            alert("❌ Falha de comunicação: " + err);
          })
          .apiAtualizarChaveValor('Config_Global', payload);
      } else {
        setTimeout(() => { self.saving = false; self.isEditing = false; }, 1000);
      }
    }
  }
};
</script>

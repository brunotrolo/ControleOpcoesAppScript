<template id="menu-sidebar-template">
  <div>
    <aside 
      :class="isCollapsed ? 'w-20' : 'w-64'"
      class="desktop-sidebar flex-col h-full bg-[var(--app-bg)] border-r border-[var(--app-border)] transition-all duration-300 ease-in-out z-50">
      
      <div class="p-4 flex items-center" :class="isCollapsed ? 'justify-center' : 'space-x-3'">
        <button @click="$emit('toggle')" 
                class="p-2 rounded-xl hover:bg-[var(--m3-on-surface)]/5 text-[var(--m3-on-surface-variant)] transition-colors flex-shrink-0">
          <i data-lucide="menu" class="w-6 h-6"></i>
        </button>

        <div v-if="!isCollapsed" class="flex flex-col transition-all duration-300 overflow-hidden">
          <h1 class="text-lg font-bold tracking-tight text-[var(--m3-on-surface)] leading-none whitespace-nowrap">Stock Options</h1>
          <span class="text-[9px] text-[var(--m3-on-surface-variant)] uppercase tracking-[0.2em] font-bold">Intelligence</span>
        </div>
      </div>

      <nav class="flex-1 px-3 space-y-2 py-4 overflow-y-auto log-scrollbar">
        <div v-for="item in menu" :key="'desk-'+item.id">
          <button 
            @click="$emit('navigate', item.id)" 
            :title="isCollapsed ? item.label : ''"
            :class="[
              activeView === item.id 
                ? 'bg-[var(--m3-primary)]/15 text-[var(--m3-primary)]' 
                : 'text-[var(--m3-on-surface-variant)] hover:bg-[var(--m3-on-surface)]/5',
              isCollapsed ? 'justify-center p-3' : 'justify-start p-3 space-x-4'
            ]"
            class="w-full flex items-center group rounded-full transition-all duration-200"
          >
            <div class="flex-shrink-0 flex items-center justify-center" 
                 :class="activeView === item.id ? 'text-[var(--m3-primary)]' : 'text-[var(--m3-on-surface-variant)]'">
              <i :data-lucide="item.icon" class="w-5 h-5 stroke-[2]"></i>
            </div>
            
            <span v-if="!isCollapsed" 
                  class="text-sm font-semibold tracking-wide text-left whitespace-nowrap overflow-hidden transition-all">
              {{ item.label }}
            </span>
          </button>
        </div>
      </nav>

      <div class="p-4 border-t border-[var(--app-border)] flex justify-center py-4">
        <div :class="status === 'Online' ? 'bg-emerald-500' : 'bg-amber-500'" 
             class="h-2.5 w-2.5 rounded-full shadow-sm ring-2 ring-[var(--app-bg)]"></div>
      </div>
    </aside>

    <nav class="mobile-bottom-bar h-[112px] bg-[var(--app-surface)] border-t border-[var(--app-border)] shadow-[0_-10px_30px_rgba(0,0,0,0.6)] items-center overflow-x-auto hide-scrollbar pb-safe">
      
      <div class="flex items-center gap-1 px-4 w-max mx-auto h-full">
        <button 
          v-for="item in menu" :key="'mob-'+item.id"
          @click="$emit('navigate', item.id)"
          class="relative flex flex-col items-center justify-center w-20 h-20 rounded-[1.5rem] transition-all duration-200 group active:scale-95"
        >
          <div :class="activeView === item.id ? 'bg-[var(--m3-primary)]/20 text-[var(--m3-primary)] scale-110 shadow-inner' : 'text-[var(--m3-on-surface-variant)] hover:bg-black/5'" 
               class="p-4 rounded-[1.5rem] transition-all duration-300 flex items-center justify-center">
            <i :data-lucide="item.icon" class="w-10 h-10 stroke-[2.5]"></i>
          </div>
          
          <span v-if="activeView === item.id" class="absolute bottom-[-8px] w-2.5 h-2.5 bg-[var(--m3-primary)] rounded-full shadow-[0_0_8px_var(--m3-primary)]"></span>
        </button>
      </div>

    </nav>
    
  </div>
</template>

<script>
window.MenuSidebar = {
  props: { menu: Array, activeView: String, status: String, isCollapsed: Boolean, isLoading: Boolean },
  template: '#menu-sidebar-template',
  emits: ['navigate', 'toggle'],
  mounted() { this.renderIcons(); },
  updated() { this.renderIcons(); },
  methods: {
    renderIcons() {
      setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 10);
    }
  }
};
</script>

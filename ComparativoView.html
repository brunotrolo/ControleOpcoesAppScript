            <div class="flex items-baseline gap-1.5">

          <button @click="processarComparacao"
            class="w-full xl:w-auto px-8 py-3.5 bg-gradient-to-br from-white to-slate-50 text-slate-700 border border-slate-200 rounded-xl text-[10px] font-black uppercase tracking-[0.3em] shadow-sm hover:text-brand-indigo hover:border-indigo-200 hover:bg-indigo-50/30 hover:shadow-md hover:shadow-indigo-500/10 hover:scale-105 active:scale-95 transition-all duration-300 flex items-center justify-center gap-3">

    <div v-if="mostrarResultados" class="max-w-[1400px] mx-auto mt-16 grid grid-cols-1 md:grid-cols-2 gap-8 pb-32">
      
      <div class="premium-card p-10 bg-gradient-to-br from-white to-emerald-50/50 border-emerald-100 shadow-xl relative overflow-hidden">
        <div class="absolute -right-6 -top-6 text-9xl opacity-5 italic font-black text-emerald-900 pointer-events-none">ROC</div>
        <span class="px-4 py-1.5 bg-emerald-100 text-emerald-700 rounded-lg text-[9px] font-black uppercase tracking-widest mb-6 inline-block">Eficiência Financeira</span>
        <div class="flex items-baseline gap-4 mb-2">
          <h3 class="text-5xl font-black font-mono text-emerald-950 tracking-tighter">{{ rankingRentabilidade.ticker }}</h3>
          <span class="text-xl font-black text-emerald-600 font-mono">{{ formatPct(rankingRentabilidade.anualizado) }} a.a.</span>
        </div>
        <p class="text-[9px] font-black text-emerald-700/60 uppercase tracking-[0.3em] mb-8">Onde seu dinheiro rende mais por dia</p>
        <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-8 border border-emerald-100 shadow-sm">
          <h4 class="text-[11px] font-black text-emerald-900 uppercase mb-4 flex items-center gap-3 underline decoration-emerald-200 underline-offset-4">Veredito de Alocação</h4>
          <p class="text-sm text-slate-700 leading-relaxed font-medium">
            Esta é a opção vencedora para quem busca <b>renda mensal pura</b>. O sistema calculou que ela devolve <b>{{ formatMoney(rankingRentabilidade.premioPorMil) }}</b> de prêmio para cada R$ 1.000,00 que você deixa em garantia. É o cavalo mais rápido para gerar caixa rápido.
          </p>
        </div>
      </div>

      <div class="premium-card p-10 bg-gradient-to-br from-white to-indigo-50/50 border-indigo-100 shadow-xl relative overflow-hidden">
        <div class="absolute -right-6 -top-6 text-9xl opacity-5 italic font-black text-indigo-900 pointer-events-none">SAFE</div>
        <span class="px-4 py-1.5 bg-indigo-100 text-indigo-700 rounded-lg text-[9px] font-black uppercase tracking-widest mb-6 inline-block">Proteção Patrimonial</span>
        <div class="flex items-baseline gap-4 mb-2">
          <h3 class="text-5xl font-black font-mono text-indigo-950 tracking-tighter">{{ rankingSeguranca.ticker }}</h3>
          <span class="text-xl font-black text-indigo-600 font-mono">{{ formatPct(rankingSeguranca.margemQueda) }} de folga</span>
        </div>
        <p class="text-[9px] font-black text-indigo-700/60 uppercase tracking-[0.3em] mb-8">Menor risco de ser exercido</p>
        <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-8 border border-indigo-100 shadow-sm">
          <h4 class="text-[11px] font-black text-indigo-900 uppercase mb-4 flex items-center gap-3 underline decoration-indigo-200 underline-offset-4">Veredito de Risco</h4>
          <p class="text-sm text-slate-700 leading-relaxed font-medium">
            No cenário simulado de <b>{{ simulacaoQueda }}% de queda</b>, esta PUT provou ser a mais resiliente. O ativo precisaria cair mais do que <b>{{ formatPct(rankingSeguranca.margemQueda) }}</b> <i>além</i> do cenário simulado para você ser exercido. O seu break-even está em <b>{{ formatMoney(rankingSeguranca.breakeven) }}</b>.
          </p>
        </div>
      </div>

    </div>

</template>

<script>
window.ComparativoView = {
  template: '#comparativo-view-template',
  props: ['isMobile', 'isLoading'], // 🚀 Injetados pelo AppCore
  data() {
    return {
      cardCounter: 2,
      cards: [],
      simulacaoQueda: 0,
      ordenarPor: 'padrao',
      mostrarResultados: false,
      rankingRentabilidade: {},
      rankingSeguranca: {}
    };
  },
  computed: {
    legendaEstresse() {
      const msgs = { 0: "Análise baseada no cenário atual da B3.", 5: "Simula uma correção de 'suporte de médias'.", 10: "Simula um dia de forte estresse setorial.", 20: "Cenário de pânico (Crash)." };
      return msgs[this.simulacaoQueda];
    },
    agregadoBasket() {
      const validos = this.cards.filter(c => c.api.isValid);
      const qtdCards = validos.length;
      if (qtdCards < 2) return null;
      let somaPremioUnitario = 0; let somaLucroPct = 0; let somaLotes = 0; let somaNotional = 0; let somaCredito = 0;
      validos.forEach(c => {
        somaPremioUnitario += parseFloat(c.api.premioAtual || 0);
        somaLucroPct += this.calcLucroPct(c);
        somaLotes += parseInt(c.qtd || 0);
        somaNotional += this.calcNotional(c);
        somaCredito += this.calcPremioTotal(c);
      });
      return { qtdCards, somaPremioUnitario, mediaPremioUnitario: somaPremioUnitario / qtdCards, mediaLucroPct: somaLucroPct / qtdCards, somaLotes, somaNotional, somaCredito, mediaCredito: somaCredito / qtdCards };
    }
  },
  created() {
    this.carregarCache();
  },
  watch: {
    cards: { 
      handler() { 
        this.salvarCache(); 
        this.$nextTick(() => { if(window.lucide) lucide.createIcons(); });
      }, 
      deep: true 
    }
  },
  methods: {
    limparArena() {
      localStorage.removeItem('arena_put_cache');
      this.cards = [this.criarCardVazio(1), this.criarCardVazio(2)];
      this.cardCounter = 2; this.mostrarResultados = false; this.simulacaoQueda = 0; this.ordenarPor = 'padrao';
      this.$nextTick(() => lucide.createIcons());
    },
    salvarCache() {
      localStorage.setItem('arena_put_cache', JSON.stringify({ cards: this.cards, cardCounter: this.cardCounter, simulacaoQueda: this.simulacaoQueda }));
    },
    carregarCache() {
      const cache = localStorage.getItem('arena_put_cache');
      if (cache) {
        const parsed = JSON.parse(cache);
        this.cards = parsed.cards;
        this.cardCounter = parsed.cardCounter;
        this.simulacaoQueda = parsed.simulacaoQueda || 0;
        if (this.cards.some(c => c.api.isValid)) this.processarComparacao();
      } else {
        this.cards = [this.criarCardVazio(1), this.criarCardVazio(2)];
      }
      this.$nextTick(() => lucide.createIcons());
    },
    criarCardVazio(id) {
      return { id, ticker: '', qtd: 100, loading: false, error: '', api: { spotPrice: 0, strike: 0, premioAtual: 0, dte: 0, trades: 0, isValid: false } };
    },
    adicionarCard() {
      this.cardCounter++;
      this.cards.push(this.criarCardVazio(this.cardCounter));
      this.mostrarResultados = false;
      this.ordenarPor = 'padrao';
      this.$nextTick(() => {
        lucide.createIcons();
        const container = this.$el.querySelector('.overflow-x-auto');
        if(container) container.scrollTo({ left: container.scrollWidth, behavior: 'smooth' });
      });
    },
    removerCard(id) {
      if (this.cards.length > 2) {
        this.cards = this.cards.filter(c => c.id !== id);
        this.mostrarResultados = false;
        this.$nextTick(() => lucide.createIcons());
      }
    },
    ordenarArena() {
      if (this.ordenarPor === 'padrao') { this.cards.sort((a, b) => a.id - b.id); return; }
      this.cards.sort((a, b) => {
        if (a.api.isValid && !b.api.isValid) return -1;
        if (!a.api.isValid && b.api.isValid) return 1;
        if (this.ordenarPor === 'lucro') return this.calcLucroPct(b) - this.calcLucroPct(a);
        if (this.ordenarPor === 'seguranca') return this.getDistanciaNumerica(b) - this.getDistanciaNumerica(a);
        if (this.ordenarPor === 'premio') return (b.api.premioAtual || 0) - (a.api.premioAtual || 0);
        return 0;
      });
    },
    ajustarPremio(card, delta) {
      let p = parseFloat(card.api.premioAtual || 0);
      card.api.premioAtual = Math.max(0.01, parseFloat((p + delta).toFixed(2)));
      this.mostrarResultados = false;
    },
    ajustarQtd(card, valor) {
      card.qtd = Math.max(100, card.qtd + valor);
      this.mostrarResultados = false;
    },
    buscarDadosAPI(card) {
      if (!card.ticker || card.ticker.length < 4) return;
      card.loading = true; card.error = ''; card.api.isValid = false; this.mostrarResultados = false;
      google.script.run.withSuccessHandler((res) => {
          card.loading = false;
          if (res && res.success) { card.api = { ...res.data, isValid: true }; this.ordenarArena(); }
          this.$nextTick(() => lucide.createIcons());
      }).apiIntegracaoOpLab(card.ticker);
    },
    calcPremioTotal(card) { return (card.api.premioAtual || 0) * (card.qtd || 0); },
    calcNotional(card) { return (card.api.strike || 0) * (card.qtd || 0); },
    formatMoney(val) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0); },
    formatPct(val) { return (val || 0).toFixed(2).replace('.', ',') + '%'; },
    calcLucroPct(card) { return card.api.strike ? (card.api.premioAtual / card.api.strike) * 100 : 0; },
    getDistanciaNumerica(card) {
      if (!card.api.strike) return -999;
      const be = card.api.strike - card.api.premioAtual;
      return ((card.api.spotPrice - be) / card.api.spotPrice) * 100;
    },
    getDistanciaBreakEven(card) {
      const dist = this.getDistanciaNumerica(card);
      return dist === -999 ? "---" : (dist > 0 ? `+${dist.toFixed(1)}%` : `${dist.toFixed(1)}% risco`);
    },
    processarComparacao() {
      const v = this.cards.filter(c => c.api.isValid && c.api.premioAtual > 0);
      if (v.length < 2) return;
      const analise = v.map(c => {
        const premioTotal = this.calcPremioTotal(c);
        const notional = this.calcNotional(c);
        const rocBruto = (premioTotal / notional) * 100;
        const anualizado = c.api.dte > 0 ? (rocBruto / c.api.dte) * 252 : rocBruto;
        const breakeven = c.api.strike - c.api.premioAtual;
        const premioPorMil = (premioTotal / notional) * 1000;
        const spotSimulado = c.api.spotPrice * (1 - (this.simulacaoQueda / 100));
        const margemQueda = spotSimulado > 0 ? ((spotSimulado - breakeven) / spotSimulado) * 100 : 0;
        return { id: c.id, ticker: c.ticker.toUpperCase(), rocBruto, anualizado, breakeven, margemQueda, premioPorMil, dte: c.api.dte, spot: spotSimulado };
      });
      this.rankingRentabilidade = [...analise].sort((a, b) => b.anualizado - a.anualizado)[0];
      this.rankingSeguranca = [...analise].sort((a, b) => b.margemQueda - a.margemQueda)[0];
      this.mostrarResultados = true;
      if (this.ordenarPor === 'padrao') { this.ordenarPor = 'lucro'; this.ordenarArena(); }
      this.$nextTick(() => lucide.createIcons());
    }
  }
};
</script>

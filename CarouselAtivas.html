  <script>

  const carouselCurrencyFormatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
  const carouselNumberFormatter = new Intl.NumberFormat('pt-BR');

  const CardOperacao = {
    props: { op: { type: Object, required: true } },
    template: '#card-operacao-template',
    computed: {
      distanciaSpot() {
        const strike = Number(this.op.strike) || 0;
        const spot = Number(this.op.spotPrice) || 0;
        return (strike === 0 || spot === 0) ? 0 : ((spot / strike) - 1) * 100;
      },
      tipoBadge() {
        const t = String(this.op.tipoOpcao || '').toUpperCase();
        const d = String(this.op.direcaoTrade || '').toUpperCase();
        if (d.includes('VENDA') && t.includes('PUT')) return 'bg-fuchsia-100 text-fuchsia-800 border-fuchsia-200';
        if (d.includes('VENDA') && t.includes('CALL')) return 'bg-amber-100 text-amber-800 border-amber-200';
        if (d.includes('COMPRA') && t.includes('PUT')) return 'bg-rose-100 text-rose-800 border-rose-200';
        if (d.includes('COMPRA') && t.includes('CALL')) return 'bg-sky-100 text-sky-800 border-sky-200';
        return 'bg-slate-100 text-slate-800 border-slate-200';
      },
      styleContext() {
        const m = String(this.op.moneynessCode || '').toUpperCase();
        const pct = Number(this.op.plTotalPct) || 0;
        // 🚨 Emojis Restaurados!
        if (m.includes('ITM') && pct < 0) return { borderClass: 'border-red-200 bg-red-50/10', badgeClass: 'bg-red-500 text-white border-red-600 animate-pulse', footerClass: 'bg-red-50 border-red-100 text-red-900', icon: '' };
        if (m.includes('ITM') || m.includes('ATM')) return { borderClass: 'border-amber-200 bg-amber-50/10', badgeClass: 'bg-amber-100 text-amber-800 border-amber-300', footerClass: 'bg-amber-50 border-amber-100 text-amber-900', icon: '' };
        return { borderClass: 'border-emerald-200 bg-emerald-50/10', badgeClass: 'bg-emerald-100 text-emerald-800 border-emerald-300', footerClass: 'bg-emerald-50 border-emerald-100 text-emerald-900', icon: '' };
      }
    },
    methods: {
      formatVal(val, type) {
        if (!val && val !== 0) return '--';
        if (type === 'date') return val instanceof Date ? val.toLocaleDateString('pt-BR') : String(val).split(' ')[0];
        const num = Number(val);
        if (isNaN(num)) return val;

        // 🚀 USA O CACHE EM VEZ DE CRIAR UM "NEW" A CADA RENDER
        if (type === 'currency') return carouselCurrencyFormatter.format(num);
        if (type === 'number') return carouselNumberFormatter.format(num);

        if (type === 'pct') return (num * 100).toFixed(2).replace('.', ',') + '%';
        if (type === 'delta') return num.toFixed(4).replace('.', ',');
        return val;
      }
    }
  };

  window.CarouselAtivas = {
    components: { 'card-operacao': CardOperacao },
    props: { isMobile: Boolean, isLoading: Boolean, statsPreCalculados: Object },
    template: '#carousel-ativas-template',
    computed: {
      activeTrades() {
        const lista = this.statsPreCalculados?.listaAtivas || [];
        return [...lista].sort((a, b) => (a.dteCorridos || 999) - (b.dteCorridos || 999));
      },
      // 1. Adicione esta propriedade computada em window.CarouselAtivas
      operacoesPorVencimento() {
        if (!this.activeTrades.length) return {};
        return this.activeTrades.reduce((acc, op) => {
          const venc = this.formatVal(op.dataVencimento, 'date');
          if (!acc[venc]) acc[venc] = [];
          acc[venc].push(op);
          return acc;
        }, {});
      },
      opsOTM() { return this.activeTrades.filter(op => String(op.moneynessCode).toUpperCase().includes('OTM')).length; },
      opsITM() { return this.activeTrades.filter(op => String(op.moneynessCode).toUpperCase().includes('ITM')).length; }
    },
    methods: {
      formatVal(val, type) {
        return CardOperacao.methods.formatVal(val, type);
      },

      // 🚀 NOVO: Auxiliar blindado para calcular a distância
      getDistanciaSpot(op) {
        const strike = Number(op.strike) || 0;
        const spot = Number(op.spotPrice) || 0;
        if (strike === 0 || spot === 0) return 0;
        return ((spot / strike) - 1) * 100;
      },

      getStyleContext(op) {
        const m = String(op.moneynessCode || '').toUpperCase();
        const pct = Number(op.plTotalPct) || 0;
        // 🚨 Emojis Restaurados no Mobile também!
        if (m.includes('ITM') && pct < 0) return { borderClass: 'border-red-200 bg-red-50/10', badgeClass: 'bg-red-500 text-white border-red-600', footerClass: 'bg-red-50 border-red-100 text-red-900', icon: '' };
        if (m.includes('ITM') || m.includes('ATM')) return { borderClass: 'border-amber-200 bg-amber-50/10', badgeClass: 'bg-amber-100 text-amber-800 border-amber-300', footerClass: 'bg-amber-50 border-amber-100 text-amber-900', icon: '' };
        return { borderClass: 'border-emerald-200 bg-emerald-50/10', badgeClass: 'bg-emerald-100 text-emerald-800 border-emerald-300', footerClass: 'bg-emerald-50 border-emerald-100 text-emerald-900', icon: '' };
      },
      
      getTipoBadgeClass(op) {
        const t = String(op.tipoOpcao || '').toUpperCase();
        const d = String(op.direcaoTrade || '').toUpperCase();
        if (d.includes('VENDA') && t.includes('PUT')) return 'bg-fuchsia-100 text-fuchsia-800 border-fuchsia-200';
        if (d.includes('VENDA') && t.includes('CALL')) return 'bg-amber-100 text-amber-800 border-amber-200';
        if (d.includes('COMPRA') && t.includes('PUT')) return 'bg-rose-100 text-rose-800 border-rose-200';
        if (d.includes('COMPRA') && t.includes('CALL')) return 'bg-sky-100 text-sky-800 border-sky-200';
        return 'bg-slate-100 text-slate-800 border-slate-200';
      }
    },
  };
  </script>

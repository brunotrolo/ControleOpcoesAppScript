<script>
// 1. CARD DESKTOP (Intocado)
window.CardOperacao = {
  props: ['op', 'configFields'],
  template: '#card-operacao-template',
  computed: {
    isVenda() { return String(this.getVal('VENDA/COMPRA') || '').toUpperCase().includes('VENDA'); },
    tipoStyle() {
      const tipo = String(this.getVal('Tipo')).toUpperCase(); const venda = this.isVenda;
      if (venda && tipo.includes('PUT')) return 'bg-amber-100 text-amber-800 border-amber-200';
      if (venda && tipo.includes('CALL')) return 'bg-indigo-100 text-indigo-800 border-indigo-200';
      if (!venda && tipo.includes('PUT')) return 'bg-rose-100 text-rose-800 border-rose-200';
      if (!venda && tipo.includes('CALL')) return 'bg-emerald-100 text-emerald-800 border-emerald-200';
      return 'bg-slate-100 text-slate-800 border-slate-200';
    },
    styleContext() {
      const m = String(this.getVal('MONEYNESS')).toUpperCase();
      if (m.includes('ITM')) return { border: 'border-red-100', badge: 'bg-red-100 text-red-800 border-red-200', footer: 'bg-red-50 border-red-100 text-red-900', icon: '⚠️' };
      if (m.includes('OTM')) return { border: 'border-emerald-100', badge: 'bg-emerald-100 text-emerald-800 border-emerald-200', footer: 'bg-emerald-50 border-emerald-100 text-emerald-900', icon: '✅' };
      return { border: 'border-blue-100', badge: 'bg-blue-100 text-blue-800 border-blue-200', footer: 'bg-blue-50 border-blue-100 text-blue-900', icon: '🔵' };
    },
    plClass() { return this.parseNumVal(this.getVal('P/L TOTAL')) >= 0 ? 'text-emerald-600' : 'text-red-600'; }
  },
  methods: {
    getVal(searchKey) {
      if (!this.op) return '';
      const keys = Object.keys(this.op);
      const norm = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim();
      const target = norm(searchKey);
      const foundKey = keys.find(k => norm(k).includes(target) || (target === 'QUANTIDADE' && norm(k) === 'QTD'));
      let valor = foundKey ? this.op[foundKey] : '';
      if (target === 'DIST') {
        const strike = this.parseNumVal(this.getVal('STRIKE')); const spot = this.parseNumVal(this.getVal('SPOT'));
        if (strike > 0 && spot > 0) { const d = ((spot / strike) - 1) * 100; return (d > 0 ? '+' : '') + d.toFixed(1) + '%'; }
      }
      return valor;
    },
    getValExato(targetKey) {
      if (!this.op) return '';
      const norm = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim();
      const foundKey = Object.keys(this.op).find(k => norm(k) === norm(targetKey));
      return foundKey ? this.op[foundKey] : '';
    },
    parseNumVal(v) {
      if (typeof v === 'number') return v;
      return parseFloat(String(v || '0').replace(/[R$.%]/g, '').replace(',', '.').trim()) || 0;
    },
    formatValue(field, val) {
      if (!val && val !== 0) return '-';
      const n = this.parseNumVal(val);
      if (field.type === 'moeda') return this.formatMoeda(val);
      if (field.key === 'DELTA') return n.toFixed(4);
      if (field.label.includes('Máx') || field.type === 'pct' || field.key.includes('PCT')) return n.toFixed(2).replace('.', ',') + ' %';
      return val;
    },
    formatMoeda(v) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(this.parseNumVal(v)); }
  }
};

// 2. CARROSSEL PAI (Com Inteligência Mobile)
const CarouselAtivas = {
  components: { 'card-operacao': CardOperacao },
  props: { operations: { type: Array, default: () => [] } },
  template: '#carousel-ativas-template',
  data() {
    return {
      isMobile: true, // LIGANDO O MODO MOBILE À FORÇA PARA TESTE!
      configFields: [
        { key: 'QUANTIDADE', label: 'Qtd', type: 'num' }, { key: 'PRÊMIO (PM)', label: 'PM', type: 'moeda' }, { key: 'PRÊMIO ATUAL', label: 'Atual', type: 'moeda' },
        { key: 'P/L TOTAL %', label: 'P/L %', type: 'pct' }, { key: 'GANHO MAXIMO', label: 'Ganho Máx', type: 'currency' }, { key: 'LUCRO MAX', label: 'Lucro Máx', type: 'currency' },
        { key: 'NOCIONAL', label: 'Nocional', type: 'moeda' }, { key: 'BREAK-EVEN', label: 'BREAK-EVEN', type: 'moeda' }, { key: 'DELTA', label: 'Delta Δ', type: 'num' }
      ]
    }
  },
  mounted() {
    // Liga o radar: Se a tela for menor que 768px (Tablets/Celulares), vira Mobile.
    this.checkMobile();
    window.addEventListener('resize', this.checkMobile);
  },
  beforeUnmount() {
    window.removeEventListener('resize', this.checkMobile);
  },
  computed: {
    operacoesOrdenadas() {
      if (!this.operations || this.operations.length === 0) return [];
      return [...this.operations].sort((a, b) => {
        const dateA = this.parseDateMobile(this.getValMobile(a, 'Vencimento'));
        const dateB = this.parseDateMobile(this.getValMobile(b, 'Vencimento'));
        if (dateA - dateB !== 0) return dateA - dateB;
        return String(this.getValMobile(a, 'Ticker') || '').localeCompare(String(this.getValMobile(b, 'Ticker') || ''));
      });
    },
    // 🔥 A MÁGICA DO AGRUPAMENTO (OTM Dash Style)
    operacoesPorVencimento() {
      const grupos = {};
      this.operacoesOrdenadas.forEach(op => {
        const venc = this.getValMobile(op, 'Vencimento') || 'Sem Data';
        if (!grupos[venc]) grupos[venc] = [];
        grupos[venc].push(op);
      });
      return grupos;
    }
  },
  methods: {
    checkMobile() {
      this.isMobile = window.innerWidth < 768; // Detecção de tela
    },
    abrirBottomSheetMobile(op) {
      console.log("Preparando para abrir a Bottom Sheet com a operação:", this.getValMobile(op, 'Ticker'));
    },
    
    getValMobile(op, searchKey) {
      if (!op) return '';
      const norm = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim();
      const foundKey = Object.keys(op).find(k => norm(k).includes(norm(searchKey)));
      return foundKey ? op[foundKey] : '';
    },
    getValExatoMobile(op, targetKey) {
      if (!op) return '';
      const norm = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim();
      const foundKey = Object.keys(op).find(k => norm(k) === norm(targetKey));
      return foundKey ? op[foundKey] : '';
    },
    parseNumMobile(v) {
      return parseFloat(String(v || '0').replace(/[R$.%]/g, '').replace(',', '.').trim()) || 0;
    },
    formatMoedaMobile(v) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(this.parseNumMobile(v));
    },
    formatValueMobile(chave, val) {
       const n = this.parseNumMobile(val);
       return n.toFixed(2).replace('.', ',') + ' %';
    },
    parseDateMobile(str) {
      if (!str) return new Date(2099, 1, 1);
      const p = String(str).split('/');
      return p.length < 3 ? new Date(2099, 1, 1) : new Date(p[2], p[1]-1, p[0]);
    }
  }
};
</script>

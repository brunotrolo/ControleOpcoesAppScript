  /**
   * O Motor Principal de ETL
   * @param {Array} matrizRaw - Os dados brutos do Google Sheets
   * @param {String} contexto - Qual aba estamos a ler (ex: 'COCKPIT', 'NECTON_IMPORT')
   */
  processar(matrizRaw, contexto = 'GLOBAL', ignorarCabecalho = false) {
    if (!matrizRaw || matrizRaw.length < 2) return [];
    
    // 1. Desduplicador Inteligente de Cabeçalhos (Resolve o duplo Status da Necton)
    const cabecalhoLimpo = [];
    const contagemChaves = {};
    
    matrizRaw[0].forEach(h => {
      let base = String(h || '').trim().toUpperCase();
      if (contagemChaves[base]) {
        contagemChaves[base]++;
        cabecalhoLimpo.push(`${base}_${contagemChaves[base]}`); // Ex: STATUS_2
      } else {
        contagemChaves[base] = 1;
        cabecalhoLimpo.push(base);
      }
    });

    const dados = ignorarCabecalho ? matrizRaw : matrizRaw.slice(1);
    
    // 2. Mescla o Dicionário Base com as Regras Específicas do Contexto
    const dicionarioAtivo = { ...this.BASE_DICT, ...(this.CONTEXTOS[contexto] || {}) };
    
    // 3. Constrói o Mapeador Semântico
    const mapaColunas = cabecalhoLimpo.map((colNome, index) => {
      const definicao = dicionarioAtivo[colNome];
      if (definicao) {
        return { index, key: definicao.key, type: definicao.type };
      }
      return { index, key: this._camelize(colNome), type: 'texto_raw' };
    }).filter(c => c.key !== '');

    const processados = [];

    // 4. Varredura e Limpeza
    for (const linha of dados) {
      if (!linha || linha.length === 0) continue;
      const primeiraCelula = String(linha[0] || '').trim().toUpperCase();
      if (primeiraCelula === '' || primeiraCelula.includes('SUBTOTAL')) continue;

      const obj = {};
      
      for (const col of mapaColunas) {
        const valorBruto = linha[col.index];
        obj[col.key] = this._parseTipado(valorBruto, col.type);
        
        if (col.type === 'data') {
          obj[col.key + 'Date'] = this._gerarTimestamp(valorBruto);
        }
      }
      processados.push(obj);
    }

    return processados;
  },

  /**
   * --- FUNÇÕES PRIVADAS DO MOTOR DE TIPAGEM ---
   */
  
  _parseTipado(valor, tipo) {
    if (valor === null || valor === undefined || valor === '') {
      return (tipo === 'moeda' || tipo === 'numero' || tipo === 'percentual' || tipo === 'inteiro') ? 0 : '';
    }

    const vStr = String(valor).trim();

    switch (tipo) {
      case 'texto':
      case 'texto_raw':
        return vStr;
        
      case 'inteiro':
        const intVal = parseInt(vStr.replace(/\D/g, ''), 10);
        return isNaN(intVal) ? 0 : intVal;

      case 'moeda':
      case 'numero':
      case 'percentual':
        return this._limparNumero(vStr);

      case 'data':
        return vStr; 

      default:
        return vStr;
    }
  },

  _limparNumero(valorStr) {
    if (typeof valorStr === 'number') return valorStr;
    
    let limpo = String(valorStr).replace(/R\$\s?/g, '').replace(/%/g, '').trim();
    
    if (limpo.includes(',') && limpo.includes('.')) {
      if (limpo.lastIndexOf(',') > limpo.lastIndexOf('.')) {
        limpo = limpo.replace(/\./g, '').replace(',', '.'); 
      } else {
        limpo = limpo.replace(/,/g, ''); 
      }
    } else if (limpo.includes(',')) {
      limpo = limpo.replace(',', '.');
    }
    
    const floatVal = parseFloat(limpo);
    return isNaN(floatVal) ? 0 : floatVal;
  },

  _gerarTimestamp(dataStr) {
    if (dataStr instanceof Date) return dataStr.getTime();
    const str = String(dataStr).trim();
    if (str.includes('/')) {
        const partes = str.split(' ')[0].split('/'); 
        if (partes.length === 3) {
            return new Date(partes[2], partes[1] - 1, partes[0]).getTime();
        }
    }
    return 0;
  },

  _camelize(str) {
    return str.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (m, chr) => chr.toUpperCase());
  },

  formatarMoeda(valor) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor || 0);
  }

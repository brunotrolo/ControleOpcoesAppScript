<template id="card-distrib-moneyness-template">
  <div v-if="isMobile" class="w-full bg-white border border-slate-200 rounded-[32px] pt-6 px-6 pb-8 shadow-sm flex flex-col h-full relative overflow-hidden">
    
    <div class="absolute bottom-0 left-0 w-full h-6 flex z-20 font-mono font-black text-[15px] text-white drop-shadow-md">
      <div :style="{ width: (displayStats.otmPct || 0) + '%' }" class="h-full bg-emerald-500 shadow-[0_-5px_15px_rgba(16,185,129,0.2)] transition-all duration-1000 flex items-center justify-center overflow-hidden">
        <span v-if="displayStats.otmPct > 0" class="leading-none pt-0.5">{{ displayStats.otmPct }}%</span>
      </div>
      <div :style="{ width: (displayStats.atmPct || 0) + '%' }" class="h-full bg-amber-400 transition-all duration-1000 flex items-center justify-center overflow-hidden">
        <span v-if="displayStats.atmPct > 0" class="text-amber-900 leading-none pt-0.5">{{ displayStats.atmPct }}%</span>
      </div>
      <div :style="{ width: (displayStats.itmPct || 0) + '%' }" class="h-full bg-red-500 shadow-[0_-5px_15px_rgba(239,68,68,0.2)] transition-all duration-1000 flex items-center justify-center overflow-hidden">
        <span v-if="displayStats.itmPct > 0" class="leading-none pt-0.5">{{ displayStats.itmPct }}%</span>
      </div>
    </div>

    <div class="flex flex-col h-full relative z-10">
      
      <div class="flex flex-col mb-4">
        <h3 class="text-slate-900 font-black tracking-tighter uppercase text-3xl leading-none">Exposição</h3>
        <div class="flex items-center mt-2 space-x-2">
          <span class="text-slate-400 uppercase tracking-[0.2em] font-bold text-[10px]">Moneyness</span>
          <template v-if="!isLoading && displayStats.total > 0">
            <span class="w-1.5 h-1.5 rounded-full" :class="statusProtecao.bgClass"></span>
            <span class="text-[10px] font-black tracking-widest uppercase" :class="statusProtecao.textClass">
              {{ statusProtecao.labelClean }}
            </span>
          </template>
        </div>
      </div>

      <div v-if="isLoading" class="flex-1 flex flex-col justify-center space-y-6 animate-pulse mt-2">
        <div class="flex justify-between w-full mb-2">
          <div class="h-4 bg-slate-100 rounded w-1/3"></div>
          <div class="h-4 bg-slate-100 rounded w-1/3"></div>
        </div>
        <div class="flex justify-around items-end w-full">
          <div v-for="i in 3" :key="i" class="flex flex-col items-center space-y-3">
            <div class="h-4 bg-slate-50 rounded w-12"></div>
            <div class="h-16 bg-slate-100 rounded-lg w-16"></div>
            <div class="h-6 bg-slate-50 rounded w-12"></div>
          </div>
        </div>
      </div>

      <template v-else>
        <div class="flex flex-col flex-1 justify-center">
          <div class="flex justify-between px-1 text-sm font-black uppercase tracking-widest mb-4">
            <span class="text-emerald-600">Segurança (OTM)</span>
            <span class="text-red-600">Risco (ITM)</span>
          </div>
          <div class="flex items-center justify-around px-1 mt-2">
            <div v-for="type in ['otm', 'atm', 'itm']" :key="type" class="flex flex-col items-center w-1/3">
              <span class="text-xs font-black uppercase tracking-widest text-slate-400 mb-1">{{ getBoxLabel(type) }}</span>
              <span :class="getHeroTextColor(type)" class="font-mono font-black text-[72px] tracking-[-0.05em] leading-none drop-shadow-sm">
                {{ displayStats[type] || 0 }}
              </span>
            </div>
          </div>
        </div>
      </template>

    </div>
  </div>

  <div v-else class="w-full bg-white border border-slate-200 rounded-[32px] p-5 md:p-7 shadow-sm flex flex-col transition-all hover:shadow-md h-full">
    <div class="flex justify-between items-start mb-6">
      <div>
        <h3 class="text-[var(--m3-on-surface)] text-lg md:text-xl font-bold tracking-tight uppercase flex items-center">Exposição</h3>
        <p class="text-[var(--m3-on-surface-variant)] text-[9px] md:text-[10px] uppercase tracking-[0.2em] font-bold mt-1">Por Moneyness</p>
      </div>
    </div>
    
    <div v-if="isLoading" class="animate-pulse space-y-6">
      <div class="h-6 bg-slate-100 rounded-full w-full"></div>
      <div class="h-4 bg-slate-50 rounded-md w-1/2"></div>
      <div class="grid grid-cols-3 gap-2"><div v-for="i in 3" :key="i" class="h-20 bg-slate-50 rounded-2xl border border-slate-100"></div></div>
    </div>
    
    <template v-else>
      <div class="relative mb-4">
        <div class="flex justify-between text-[9px] md:text-[10px] font-black uppercase tracking-widest mb-2 px-1">
          <span class="text-emerald-700">Segurança (OTM)</span><span class="text-red-700">Risco (ITM)</span>
        </div>
        <div class="w-full h-5 bg-slate-100 rounded-full overflow-hidden flex shadow-inner border border-slate-200 p-1">
          <div :style="{ width: (displayStats.otmPct || 0) + '%' }" class="h-full bg-emerald-600 rounded-l-full transition-all duration-1000 border-r border-white/20"></div>
          <div :style="{ width: (displayStats.atmPct || 0) + '%' }" class="h-full bg-amber-500 transition-all duration-1000 border-r border-white/20"></div>
          <div :style="{ width: (displayStats.itmPct || 0) + '%' }" class="h-full bg-red-600 rounded-r-full transition-all duration-1000"></div>
        </div>
        <div class="flex justify-start mt-3">
          <span :class="statusProtecao.class" class="px-2 py-1 rounded-md border text-[8px] font-black tracking-tighter uppercase shadow-sm transition-all">
            {{ statusProtecao.label }}
          </span>
          <span v-if="displayStats.poeMedio" class="bg-slate-100 text-slate-600 px-2 py-1 rounded-md text-[8px] font-bold border border-slate-200 ml-2">
            POE Médio: {{ displayStats.poeMedio }}
          </span>
        </div>
      </div>
      
      <div class="grid grid-cols-3 gap-2 md:gap-4 mt-auto">
        <div v-for="type in ['otm', 'atm', 'itm']" :key="type" :class="getBoxClass(type)" class="p-2 md:p-3 rounded-2xl border flex flex-col items-center justify-center transition-all">
          <span class="text-[8px] md:text-[9px] font-black uppercase tracking-widest mb-1 opacity-70">{{ getBoxLabel(type) }}</span>
          <div class="flex items-baseline space-x-1"><span class="font-mono font-black text-sm md:text-lg">{{ displayStats[type] || 0 }}</span><span class="text-[8px] font-bold opacity-60">POS</span></div>
          <span class="font-mono text-[9px] md:text-[11px] font-bold mt-1">{{ displayStats[type + 'Pct'] || 0 }}%</span>
        </div>
      </div>
    </template>
  </div>
</template>

<script>
window.CardDistribMoneyness = {
  props: {
    statsPreCalculados: Object,
    isLoading: Boolean, 
    isMobile: Boolean
  },
  template: '#card-distrib-moneyness-template',
  computed: {
    displayStats() {
      // 🛡️ TRAVA DE SEGURANÇA: Se o Cubo não chegou ou está vazio, devolve zeros perfeitos
      if (!this.statsPreCalculados || !this.statsPreCalculados.moneynessStats) {
        return { otm: 0, atm: 0, itm: 0, otmPct: 0, atmPct: 0, itmPct: 0, total: 0, poeMedio: '0%' };
      }
      return this.statsPreCalculados.moneynessStats;
    },
    statusProtecao() {
      const stats = this.displayStats;
      const key = stats.statusKey || 'ALERTA';
      
      const config = {
        'BLINDADO': { label: 'PORTFOLIO BLINDADO', labelClean: 'Protegido', class: 'bg-emerald-50 text-emerald-700 border-emerald-200', bgClass: 'bg-emerald-500 shadow-md', textClass: 'text-emerald-600' },
        'CONTROLADO': { label: 'RISCO CONTROLADO', labelClean: 'Risco Controlado', class: 'bg-blue-50 text-blue-700 border-blue-200', bgClass: 'bg-blue-500 shadow-md', textClass: 'text-blue-600' },
        'ALERTA': { label: 'ALERTA DE EXERCICIO', labelClean: 'Atencao ao Risco', class: 'bg-red-50 text-red-700 border-red-200 animate-pulse', bgClass: 'bg-red-500 animate-pulse', textClass: 'text-red-600 animate-pulse' }
      };

      if (!stats || stats.total === 0) {
        return { label: 'AGUARDANDO', labelClean: 'Aguardando', class: 'bg-slate-50 text-slate-400 border-slate-200', bgClass: 'bg-slate-300', textClass: 'text-slate-500' };
      }
      
      return config[key] || config['ALERTA'];
    }
  },
  methods: {
    getBoxClass(type) {
      const map = { 
        otm: 'bg-emerald-50/50 border-emerald-100 text-emerald-800', 
        atm: 'bg-amber-50/50 border-amber-100 text-amber-800', 
        itm: 'bg-red-50/50 border-red-100 text-red-800' 
      };
      return map[type];
    },
    getBoxLabel(type) {
      const map = { otm: 'Seguro', atm: 'Alerta', itm: 'Risco' };
      return map[type];
    },
    getHeroTextColor(type) {
      const map = { otm: 'text-emerald-500', atm: 'text-amber-400', itm: 'text-red-500' };
      return map[type];
    }
  }
  // Logs apagados para garantir performance máxima
};
</script>

<script>
  
const Agregador = {
  processarSumario(operacoes) {
    if (!operacoes || operacoes.length === 0) return this._gerarSumarioVazio();
    const ativas = operacoes.filter(op => String(op.status || '').toUpperCase() === 'ATIVO');
    const total = ativas.length;
    if (total === 0) return this._gerarSumarioVazio();

    const cubo = {
      listaAtivas: ativas, contagem: total, somas: {}, medias: {}, maximos: {}, minimos: {},
      agrupamentos: { porTicker: {}, porVencimento: {}, porMoneyness: {}, porEstrategia: {}, porPrazo: { curto: 0, medio: 0, longo: 0 }, porResultado: { lucro: 0, prejuizo: 0, empate: 0 } },
      timestamp: new Date().toLocaleTimeString('pt-BR')
    };

    ativas.forEach(op => {
      // A: Processamento Numérico
      Object.keys(op).forEach(key => {
        const val = op[key];
        if (typeof val === 'number') {
          if (cubo.somas[key] === undefined) { cubo.somas[key] = 0; cubo.maximos[key] = val; cubo.minimos[key] = val; }
          cubo.somas[key] += val;
          if (val > cubo.maximos[key]) cubo.maximos[key] = val;
          if (val < cubo.minimos[key]) cubo.minimos[key] = val;
        }
      });

      // B: Agrupamentos Simples (O(1) lookups)
      this._agrupar(cubo.agrupamentos.porTicker, op.ticker || 'OUTROS', op);
      this._agrupar(cubo.agrupamentos.porVencimento, op.vencimento || 'N/D', op);
      this._agrupar(cubo.agrupamentos.porMoneyness, op.moneynessCode || 'N/D', op);
      this._agrupar(cubo.agrupamentos.porEstrategia, op.id || 'SEM ESTRATEGIA', op);

      // C: Gaveta de Prazos (DTE)
      const dte = op.dte || 0;
      if (dte <= 15) cubo.agrupamentos.porPrazo.curto++;
      else if (dte <= 45) cubo.agrupamentos.porPrazo.medio++;
      else cubo.agrupamentos.porPrazo.longo++;

      // D: Gaveta de Resultados (P/L)
      const pl = op.plTotalRs || 0;
      if (pl > 1) cubo.agrupamentos.porResultado.lucro++;
      else if (pl < -1) cubo.agrupamentos.porResultado.prejuizo++;
      else cubo.agrupamentos.porResultado.empate++;
    });

    Object.keys(cubo.somas).forEach(k => { cubo.medias[k] = cubo.somas[k] / total; });
    return cubo;
  },

  _agrupar(storage, chave, op) {
    if (!storage[chave]) { storage[chave] = { count: 0, plTotal: 0, nocional: 0, delta: 0, items: [] }; }
    const s = storage[chave];
    s.count++;
    s.plTotal += (op.plTotalRs || 0);
    s.nocional += (op.nocional || 0);
    s.delta += (op.delta || 0);
    s.items.push(op);
  },

  _gerarSumarioVazio() {
    return { listaAtivas: [], contagem: 0, somas: {}, medias: {}, agrupamentos: { porTicker: {}, porVencimento: {}, porMoneyness: {}, porEstrategia: {}, porPrazo: { curto: 0, medio: 0, longo: 0 }, porResultado: { lucro: 0, prejuizo: 0, empate: 0 } } };
  }
};
</script>

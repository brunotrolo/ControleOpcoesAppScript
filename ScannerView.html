<script>

  { key: 'TICKER', label: 'Ativo', showTop: false, showBottom: true }, // Não no top como badge, pois já é o título do card
  { key: 'SPOT', label: 'Spot', showTop: false, showBottom: true, isCurrency: true },
  { key: 'IV RANK', label: 'IV Rank', showTop: true, showBottom: true },
  { key: 'OPÇÃO', label: 'Opção', showTop: false, showBottom: true },
  { key: 'STRIKE', label: 'Strike', showTop: false, showBottom: true, isCurrency: true },
  { key: 'PRÊMIO', label: 'Prêmio (R$)', showTop: true, showBottom: true, isCurrency: true },
  { key: 'VENCIMENTO', label: 'Vencimento', showTop: false, showBottom: true },
  { key: 'DTE', label: 'DTE', showTop: true, showBottom: true },
  { key: 'PERFIL', label: 'Perfil', showTop: false, showBottom: true },
  { key: 'DELTA', label: 'Delta', showTop: true, showBottom: true },
  { key: 'GAMMA', label: 'Gamma', showTop: false, showBottom: true },
  { key: 'THETA', label: 'Theta (R$)', showTop: false, showBottom: true },
  { key: 'VEGA', label: 'Vega (R$)', showTop: false, showBottom: true },
  { key: 'ROI %', label: 'ROI %', showTop: true, showBottom: true },
  { key: 'TAXA DIÁRIA', label: 'Taxa Diária', showTop: false, showBottom: true },
  { key: 'BREAKEVEN', label: 'Break-even', showTop: true, showBottom: true, isCurrency: true },
  { key: 'DIST. SPOT', label: 'Dist. Spot', showTop: true, showBottom: true },
  { key: 'SCORE', label: 'Nexo Score', showTop: true, showBottom: true },
  { key: 'VEREDITO IA', label: 'Veredito', showTop: false, showBottom: true } // O card já mostra o texto, não precisa de badge
];

const CONFIG_TENDENCIAS = [
  { key: 'TICKER', label: 'Ativo', showTop: false, showBottom: true },
  { key: 'OPCAO', label: 'Opção', showTop: false, showBottom: true },
  { key: 'SPOT_PRICE', label: 'Spot', showTop: false, showBottom: true, isCurrency: true },
  { key: 'STRIKE', label: 'Strike', showTop: false, showBottom: true, isCurrency: true },
  { key: 'VEREDITO_TENDENCIA', label: 'Tendência', showTop: true, showBottom: true },
  { key: 'IFR14', label: 'IFR 14', showTop: false, showBottom: true },
  { key: 'DIST_MMA200', label: 'Dist. MMA200', showTop: false, showBottom: true },
  { key: 'DELTA', label: 'Delta', showTop: true, showBottom: true },
  { key: 'THETA_REAL', label: 'Theta', showTop: false, showBottom: true },
  { key: 'IV_RANK', label: 'IV Rank', showTop: true, showBottom: true },
  { key: 'DTE', label: 'DTE', showTop: true, showBottom: true },
  { key: 'DIST_SPOT', label: 'Dist. Spot', showTop: false, showBottom: true },
  { key: 'PROTECAO_TECNICA', label: 'Proteção Tec.', showTop: true, showBottom: true },
  { key: 'BREAKEVEN', label: 'Break-even', showTop: true, showBottom: true, isCurrency: true },
  { key: 'PREMIO_REF', label: 'Prêmio', showTop: true, showBottom: true, isCurrency: true },
  { key: 'ROI_PERCENT', label: 'ROI %', showTop: true, showBottom: true },
  { key: 'SCORE', label: 'Score', showTop: true, showBottom: true },
  { key: 'PERFIL_RISCO', label: 'Perfil', showTop: false, showBottom: true },
  { key: 'VEREDITO_IA', label: 'Veredito', showTop: false, showBottom: true }
];

window.ScannerView = {
  template: '#scanner-view-template',
  props: {
    dadosOportunidades: { type: Array, default: () => [] },
    dadosTendencias: { type: Array, default: () => [] }
  },
  data() {
    return {
      activeTab: 'oportunidades',
      Tradutor: window.Tradutor || Tradutor // Puxa o tradutor global para o Vue
    };
  },
  computed: {
    currentConfig() {
      return this.activeTab === 'oportunidades' ? CONFIG_OPORTUNIDADES : CONFIG_TENDENCIAS;
    },
    currentData() {
      if (this.activeTab === 'oportunidades') {
        return this.dadosOportunidades;
      } else {
        // Retorna TUDO da aba Tendências, mas garante a ordenação por Perfil
        return [...this.dadosTendencias].sort((a, b) => {
          const pA = String(this.getValor(a, 'PERFIL_RISCO') || this.getValor(a, 'PERFIL') || 'Z').toUpperCase();
          const pB = String(this.getValor(b, 'PERFIL_RISCO') || this.getValor(b, 'PERFIL') || 'Z').toUpperCase();
          return pA.localeCompare(pB);
        });
      }
    },
    topColumns() {
      return this.currentConfig.filter(c => c.showTop);
    },
    bottomColumns() {
      return this.currentConfig.filter(c => c.showBottom);
    },
    iaVerdicts() {
      if (!this.currentData || this.currentData.length === 0) return [];
      
      // 1. Filtra: Pega apenas quem tem veredito e perfil preenchido
      const filtrados = this.currentData.filter(row => {
        const veredito = this.getValorVeredito(row);
        const perfil = this.getValor(row, 'PERFIL_RISCO') || this.getValor(row, 'PERFIL');
        
        const temVeredito = veredito && veredito.length > 5 && !veredito.toUpperCase().includes('PENDENTE');
        const temPerfil = perfil && String(perfil).trim() !== '';
        
        return temVeredito && temPerfil;
      });

      // 2. Ordena: Garante a ordem alfabética por Perfil (Conservador, Moderado, etc.)
      return filtrados.sort((a, b) => {
        const pA = String(this.getValor(a, 'PERFIL_RISCO') || this.getValor(a, 'PERFIL') || 'Z').toUpperCase();
        const pB = String(this.getValor(b, 'PERFIL_RISCO') || this.getValor(b, 'PERFIL') || 'Z').toUpperCase();
        return pA.localeCompare(pB);
      });
    }
  },
  mounted() {
    this.$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
  },
  updated() {
    this.$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
  },
  methods: {
    // Busca flexível: Acha a chave exata ou que contenha a palavra (Ex: "VEREDITO IA" ou "VEREDITO_IA")
    getValor(row, keyTarget) {
      if (!row) return '';
      const keyUpper = keyTarget.toUpperCase();
      const actualKey = Object.keys(row).find(k => k.toUpperCase().includes(keyUpper));
      return actualKey ? row[actualKey] : '';
    },
    
    getValorVeredito(row) {
      return this.getValor(row, 'VEREDITO IA') || this.getValor(row, 'VEREDITO_IA');
    },

    isIgnoredTopField(key) {
      // Ignora campos no loop de Badges se já os mostramos no título do card
      const k = key.toUpperCase();
      return k.includes('TICKER') || k.includes('OPÇÃO') || k.includes('OPCAO') || k.includes('STRIKE') || k.includes('PERFIL');
    },

    formatarDado(row, configCol) {
      let val = this.getValor(row, configCol.key);
      if (val === undefined || val === null || val === '') return '-';
      
      if (configCol.isCurrency) {
        // Se a planilha não mandou com R$, nós colocamos
        if (String(val).includes('R$')) return val;
        return this.Tradutor.formatarMoeda(val);
      }
      if (configCol.isPct) {
        if (String(val).includes('%')) return val;
        return val + '%';
      }
      return val;
    },

    // UX: Cores da borda do card baseadas no Perfil de Risco (Sinalização visual rápida)
    getBorderColorPorPerfil(row) {
      const perfil = String(this.getValor(row, 'PERFIL') || this.getValor(row, 'PERFIL_RISCO')).toUpperCase();
      if (perfil.includes('CONSERVADOR') || perfil.includes('BAIXO')) return 'bg-emerald-500';
      if (perfil.includes('EQUILIBRADO') || perfil.includes('MODERADO')) return 'bg-amber-400';
      if (perfil.includes('ARROJADO') || perfil.includes('ALTO')) return 'bg-rose-500';
      return 'bg-indigo-500'; // Default
    },

    // UX: Textos da tabela ganham cores se representarem alertas
    getTextColorClass(keyTarget) {
      const key = keyTarget.toUpperCase();
      if (key.includes('VEREDITO') || key.includes('SCORE') || key.includes('PERFIL') || key.includes('ROI')) {
        return 'font-bold text-slate-800';
      }
      if (key.includes('TICKER')) return 'font-black text-indigo-700';
      return 'text-slate-600';
    }
  }
};
</script>

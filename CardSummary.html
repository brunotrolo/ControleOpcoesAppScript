<template id="card-summary-template">
  <div :class="isMobile ? 'px-0 bg-transparent border-none' : 'w-full bg-white border border-slate-200 rounded-[32px] p-5 md:p-7 shadow-sm flex flex-col transition-all'"> 
    
    <div class="flex justify-between items-center mb-6" :class="isMobile ? 'px-5' : ''">
      <div>
        <h3 class="text-[var(--m3-on-surface)] text-lg md:text-xl font-bold tracking-tight uppercase flex items-center">
          Sumário
        </h3>
        <p class="text-[var(--m3-on-surface-variant)] text-[9px] md:text-[10px] uppercase tracking-[0.2em] font-bold mt-1">
          {{ totalActiveOps }} Operações
        </p>
      </div>
    </div>

    <div :class="isMobile ? 'flex overflow-x-auto gap-6 px-5 pb-8 hide-scrollbar snap-x snap-mandatory' : 'grid gap-3 md:gap-4'" 
         :style="!isMobile ? gridColsStyle : {}">
      
      <template v-if="isLoading">
        <div v-for="n in 4" :key="'skel-sum-'+n" 
             class="min-w-[280px] snap-center p-5 rounded-[30px] border border-slate-100 bg-slate-50/50 h-32 flex flex-col justify-between animate-pulse">
          <div class="h-3 bg-slate-200 rounded-full w-24"></div>
          <div class="flex flex-col gap-2">
            <div class="h-10 bg-slate-200 rounded-lg w-3/4"></div>
            <div class="h-2 bg-slate-100 rounded-full w-1/2"></div>
          </div>
        </div>
      </template>

      <template v-else>
        <div v-for="field in activeFields" :key="field.key" 
             :class="[
               getPodStyle(field).container,
               isMobile ? 'min-w-[280px] w-fit flex-shrink-0 snap-center shadow-xl py-5 px-8' : 'p-5 hover:-translate-y-1 hover:shadow-md transition-all duration-300 shadow-sm'
             ]"
             class="rounded-[30px] border flex flex-col justify-between h-32 group"
        >

          <div class="flex justify-between items-start w-full">
            <span class="text-[11px] font-black uppercase tracking-[0.2em] opacity-80 whitespace-nowrap" :class="getPodStyle(field).text">
              {{ field.label }}
            </span>
            <span class="opacity-40 group-hover:opacity-100 transition-opacity text-sm" :class="getPodStyle(field).text">
               {{ getPodStyle(field).icon }}
            </span>
          </div>

          <div class="flex flex-col w-full">
            <span :class="[ getPodStyle(field).text, isMobile ? 'text-4xl' : 'text-2xl lg:text-3xl' ]" 
                  class="font-mono font-black tracking-tighter whitespace-nowrap leading-none mb-1">
              {{ formatValue(field) }}
            </span>
            
            <span class="text-[10px] font-bold uppercase opacity-60 tracking-widest mt-1" :class="getPodStyle(field).text">
              {{ getPodStyle(field).context }}
            </span>
          </div>
        </div>
      </template>

    </div>
  </div>
</template>


<script>
const CardSummary = {
  props: {
    summaryData: { type: Array, default: () => [] }, 
    statsPreCalculados: { type: Object, default: () => ({}) }, 
    isMobile: Boolean,
    isLoading: Boolean
  },
  template: '#card-summary-template',
  computed: {
    totalActiveOps() {
      return this.statsPreCalculados.contagem || 0;
    },
    activeFields() {
      return this.summaryData.filter(f => f.active);
    },
    gridColsStyle() {
      const total = this.activeFields.length || 4;
      if (this.isMobile) return {}; 
      let cols = Math.min(total, 8);
      if (window.innerWidth < 1024) cols = Math.min(total, 2);
      return { gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` };
    }
  },
  methods: {
    formatValue(field) {
      const key = field.key; // Ex: 'PREMIO_PM'
      
      // 🚨 CORREÇÃO DA BUSCA: Mapeia o ID do Card para a chave real do Cubo
      const mapeamentoManual = {
        'PREMIO_PM': 'premioPm',
        'PREMIO_ATUAL': 'premioAtual',
        'GANHO_MAXIMO': 'ganhoMaximo',
        'PERDA_MAXIMA': 'perdaMaxima',
        'NOCIONAL': 'nocional',
        'PL_TOTAL': 'plTotalRs',
        'PL_ATUAL': 'plTotalRs',
        'PL_TOTAL_PCT': 'plTotalPct',
        'LUCRO_MAX': 'lucroMaxPct',
        'IV_CURRENT': 'ivCurrent',
        'IV_1Y_RANK': 'iv',
        'VARIATION': 'variacao',
        'VOLATILITY': 'volatilidade',
        'POE': 'poe',
        'DELTA': 'delta',
        'GAMMA': 'gamma',
        'VEGA': 'vega',
        'THETA': 'theta',
        'RHO': 'rho',
        'DTE_CORRIDOS': 'dte',
        'DTE_UTEIS': 'dteUteis'
      };

      const camelKey = mapeamentoManual[key] || key;
      const stats = this.statsPreCalculados;
      
      let valorFinal = 0;

      // 1. Seleção da Gaveta (Soma ou Média)
      if (['dte', 'iv', 'ivCurrent', 'volatilidade', 'poe', 'variacao'].includes(camelKey)) {
        valorFinal = (stats.medias && stats.medias[camelKey]) ? stats.medias[camelKey] : 0;
      } else {
        valorFinal = (stats.somas && stats.somas[camelKey]) ? stats.somas[camelKey] : 0;
      }

      // 2. Formatação Visual
      if (field.type === 'currency' || field.type === 'moeda') {
        return Tradutor.formatarMoeda(valorFinal);
      }
      if (field.type === 'percentage' || field.type === 'percentual') {
        return (valorFinal || 0).toFixed(2).replace('.', ',') + '%';
      }
      return new Intl.NumberFormat('pt-BR').format(valorFinal || 0);
    },
    
    getPodStyle(field) {
      const key = field.key;
      // Busca um valor de referência para a cor
      const mapeamentoManual = { 'PL_TOTAL': 'plTotalRs', 'PL_ATUAL': 'plTotalRs' };
      const camelKey = mapeamentoManual[key] || 'plTotalRs';
      const val = (this.statsPreCalculados.somas && this.statsPreCalculados.somas[camelKey]) || 0;
      
      if (key.includes('PL_') || key.includes('LUCRO') || key.includes('PERDA') || key.includes('GANHO')) {
        const isNeg = val < 0 || key.includes('PERDA');
        return {
          container: isNeg ? 'bg-rose-50 border-rose-100' : 'bg-emerald-50 border-emerald-100',
          text: isNeg ? 'text-rose-800' : 'text-emerald-800',
          icon: isNeg ? '' : '',
          context: isNeg ? 'Risco' : 'Performance'
        };
      }

      if (['THETA', 'DELTA', 'GAMMA', 'VEGA'].some(g => key.includes(g))) {
        return {
          container: 'bg-indigo-50 border-indigo-100',
          text: 'text-indigo-800',
          icon: '',
          context: 'Exposição'
        };
      }

      return {
        container: 'bg-slate-50 border-slate-200',
        text: 'text-slate-800',
        icon: '',
        context: 'Dados'
      };
    }
  }
};
</script>

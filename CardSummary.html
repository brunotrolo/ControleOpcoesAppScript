<template id="card-summary-template">
  <div :class="isMobile ? 'px-0 bg-transparent border-none' : 'w-full bg-white border border-slate-200 rounded-[32px] p-5 md:p-7 shadow-sm flex flex-col transition-all'"> 
    
    <div class="flex justify-between items-center mb-6" :class="isMobile ? 'px-5' : ''">
      <div>
        <h3 class="text-[var(--m3-on-surface)] text-lg md:text-xl font-bold tracking-tight uppercase flex items-center">
          Sumário
        </h3>
        <p class="text-[var(--m3-on-surface-variant)] text-[9px] md:text-[10px] uppercase tracking-[0.2em] font-bold mt-1">Status</p>
      </div>
      <div v-if="!isLoading" class="px-3 py-1 bg-blue-50 text-blue-700 border border-blue-100 rounded-full text-[8px] font-black uppercase tracking-widest">
        {{ totalActiveOps }} Ativos
      </div>
    </div>

    <div :class="isMobile ? 'flex overflow-x-auto gap-6 px-5 pb-8 hide-scrollbar snap-x snap-mandatory' : 'grid gap-3 md:gap-4'" 
         :style="!isMobile ? gridColsStyle : {}">
      
      <template v-if="isLoading">
        <div v-for="n in 4" :key="'skel-sum-'+n" 
             class="min-w-[280px] snap-center p-5 rounded-[30px] border border-slate-100 bg-slate-50/50 h-32 flex flex-col justify-between animate-pulse">
          <div class="h-3 bg-slate-200 rounded-full w-24"></div>
          <div class="flex flex-col gap-2">
            <div class="h-10 bg-slate-200 rounded-lg w-3/4"></div>
            <div class="h-2 bg-slate-100 rounded-full w-1/2"></div>
          </div>
        </div>
      </template>

      <template v-else>
        <div v-for="field in activeFields" :key="field.key" 
             :class="[
               getPodStyle(field).container,
               /* 🚨 LARGURA DINÂMICA: 'min-w-[280px]' garante o tamanho base, 'w-fit' deixa expandir conforme o número */
               isMobile ? 'min-w-[280px] w-fit flex-shrink-0 snap-center shadow-xl py-5 px-8' : 'p-5 hover:scale-[1.02] shadow-sm'
             ]"
             class="rounded-[30px] border transition-all flex flex-col justify-between h-32"
        >

          <div class="flex justify-between items-start w-full">
            <span class="text-[11px] font-black uppercase tracking-[0.2em] opacity-80 whitespace-nowrap" :class="getPodStyle(field).text">
              {{ field.label }}
            </span>
          </div>

          <div class="flex flex-col w-full">
            <span :class="[ getPodStyle(field).text, isMobile ? 'text-4xl' : 'text-xl' ]" 
                  class="font-mono font-black tracking-tighter whitespace-nowrap leading-none mb-1">
              {{ formatValue(field.value, field.type) }}
            </span>
            
            <span class="text-[10px] font-bold uppercase opacity-50" :class="getPodStyle(field).text">
              {{ getPodStyle(field).context }}
            </span>
          </div>
        </div>
      </template>

    </div>
  </div>
</template>

<script>

const summaryCurrencyFmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
const summaryNumberFmt = new Intl.NumberFormat('pt-BR');

window.CardSummary = {
  props: {
    // summaryData: { type: Array, default: () => [] }, // <-- Não usaremos mais, vamos ignorar a prop externa
    statsPreCalculados: Object,
    isMobile: Boolean,
    isLoading: Boolean
  },
  template: '#card-summary-template',
  
  data() {
    return {
      // 🎛️ PAINEL DE CONTROLE DOS CARDS (LIGA/DESLIGA, RÓTULOS E ORDEM)
      // Aqui você tem controle absoluto. Altere 'active' para false para esconder, 
      // mude o 'order' para reordenar, ou altere o 'label' para mudar o nome.
      configCampos: [
        // --- 1. Identificação ---
        { key: 'tradeId', label: 'ID Trade', type: 'texto', active: false, order: 10 },
        { key: 'estrategiaId', label: 'Estratégia', type: 'texto', active: false, order: 11 },
        { key: 'status', label: 'Status', type: 'texto', active: false, order: 12 },
        
        // --- 2. Temporal ---
        { key: 'dataTrade', label: 'Data Abertura', type: 'texto', active: false, order: 20 },
        { key: 'mesTrade', label: 'Mês Ref', type: 'numero', active: false, order: 21 },
        { key: 'dataVencimento', label: 'Vencimento', type: 'texto', active: false, order: 22 },
        { key: 'mesVencimento', label: 'Ciclo', type: 'numero', active: false, order: 23 },
        { key: 'dteCorridos', label: 'DTE Corridos', type: 'numero', active: false, order: 24 },
        { key: 'dteUteis', label: 'DTE Úteis', type: 'numero', active: false, order: 25 },
        
        // --- 3. Ativo e Contrato ---
        { key: 'simboloOpcao', label: 'Ticker Opção', type: 'texto', active: false, order: 30 },
        { key: 'tickerAtivo', label: 'Ativo', type: 'texto', active: false, order: 31 },
        { key: 'nomeEmpresa', label: 'Empresa', type: 'texto', active: false, order: 32 },
        { key: 'setor', label: 'Setor', type: 'texto', active: false, order: 33 },
        { key: 'direcaoTrade', label: 'Direção', type: 'texto', active: false, order: 34 },
        { key: 'tipoOpcao', label: 'Tipo', type: 'texto', active: false, order: 35 },
        { key: 'qtdOpcoes', label: 'Quantidade', type: 'numero', active: false, order: 36 },
        { key: 'strike', label: 'Strike', type: 'currency', active: false, order: 37 },
        { key: 'spotPrice', label: 'Preço Spot', type: 'currency', active: false, order: 38 },

        // --- 4. Financeiro e Risco ---
        { key: 'moneynessCode',        label: 'Moneyness Code',   type: 'texto',      active: false,  order: 40 },
        { key: 'premioMedio',  label: 'Prêmio Médio',   type: 'currency',   active: true,  order: 41 },
        { key: 'premioAtual',  label: 'Prêmio Atual',   type: 'currency',   active: true,  order: 42 },
        { key: 'ganhoMaximo',  label: 'Ganho Máx.',     type: 'currency',   active: true,  order: 43 },
        { key: 'potencialLucroPct',    label: 'Potencial Lucro',  type: 'percentage', active: false,  order: 44 },
        { key: 'perdaMaxima',          label: 'Risco Máx.',       type: 'currency',   active: false,  order: 45 },
        { key: 'nocional',     label: 'Nocional',       type: 'currency',   active: true,  order: 46 },
        { key: 'plTotalPct',   label: 'Rentabilidade',  type: 'percentage', active: true,  order: 47 },
        { key: 'plTotalValor',         label: 'P/L Aberto',       type: 'currency',   active: false,  order: 48 },
        { key: 'plTotalValor', label: 'P/L Sessão',     type: 'currency',   active: true,  order: 49 },
        { key: 'breakEven',            label: 'Break-Even',       type: 'currency',   active: false,  order: 50 },

        // --- 5. Volatilidade e Probabilidade ---
        { key: 'ivAtual', label: 'IV Atual', type: 'percentage', active: false, order: 60 },
        { key: 'ivRank1y', label: 'IV Rank 1Y', type: 'percentage', active: false, order: 61 },
        { key: 'variation', label: 'Variação Ativo', type: 'percentage', active: false, order: 62 },
        { key: 'moneyness', label: 'Moneyness', type: 'percentage', active: false, order: 63 },
        { key: 'priceOpcao', label: 'Preço Opção', type: 'currency', active: false, order: 64 },
        { key: 'volatility', label: 'Volatilidade', type: 'percentage', active: false, order: 65 },
        { key: 'probabilidadeSucesso', label: 'Prob. Sucesso', type: 'percentage', active: false, order: 66 },

        // --- 6. Gregas ---
        { key: 'deltaTotal', label: 'Delta Net', type: 'number', active: false, order: 70 },
        { key: 'gammaTotal', label: 'Gamma Net', type: 'number', active: false, order: 71 },
        { key: 'vegaTotal', label: 'Vega Net', type: 'number', active: false, order: 72 },
        { key: 'thetaTotal', label: 'Theta Diário', type: 'currency', active: false, order: 73 },
        { key: 'rhoTotal', label: 'Rho', type: 'number', active: false, order: 74 },
  
        // --- 7. Extras ---
        { key: 'direcaoBias', label: 'Bias', type: 'texto', active: false, order: 80 },
        { key: 'obsControle', label: 'Obs. Controle', type: 'texto', active: false, order: 81 }
      ]
    }
  },

  computed: {
    totalActiveOps() {
      // Busca a contagem diretamente do cubo V5
      return this.statsPreCalculados?.resumoGlobal?.totalOps || this.statsPreCalculados?.totalOps || 0;
    },
    
    activeFields() {
      // Puxa do resumoGlobal que o Agregador gera
      const stats = this.statsPreCalculados?.resumoGlobal || {};
      
      return this.configCampos
        .filter(campo => campo.active)
        .sort((a, b) => a.order - b.order)
        .map(campo => ({
          ...campo,
          // Busca o valor pela chave (key) que definimos no Tradutor
          value: stats[campo.key] !== undefined ? stats[campo.key] : 0
        }));
    },
    
    gridColsStyle() {
      const total = this.activeFields.length || 4;
      if (this.isMobile) {
        return { gridTemplateColumns: `repeat(1, minmax(0, 1fr))` };
      }
      let cols = 1;
      const width = window.innerWidth;
      if (width >= 640 && width < 1024) cols = 2;
      if (width >= 1024) cols = total > 8 ? 8 : total;
      return { gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` };
    }
  },
  
  // (A partir daqui mantemos o seu código intacto)
  methods: {
    formatValue(val, type) {
      if (val === undefined || val === null) return '---';
      
      // 🚀 USO DO CACHE
      if (type === 'currency') return summaryCurrencyFmt.format(val);
      if (type === 'percentage') return (val).toFixed(2).replace('.', ',') + '%';
      return summaryNumberFmt.format(val);
    },
    
    getPodStyle(field) {
      // 💡 DICA: Como mudamos para 'plTotalValor', precisamos garantir que o estilo reconheça. 
      // Por isso coloquei toUpperCase() e adicionei as palavras-chave do V5
      const key = field.key.toUpperCase();
      
      // Família 1: Financeiro
      if (key.includes('PL') || key.includes('LUCRO') || key.includes('PERDA') || key.includes('NOCIONAL')) {
        const val = parseFloat(field.value) || 0;
        const isNeg = key.includes('PERDA') || val < 0;
        return {
          container: isNeg ? 'bg-red-50 border-red-100' : 'bg-emerald-50 border-emerald-100',
          text: isNeg ? 'text-red-800' : 'text-emerald-800',
          icon: '',
          context: isNeg ? 'Risco Ativo' : 'Resultado'
        };
      }

      // Família 2: Gregas
      if (key.includes('THETA') || key.includes('DELTA') || key.includes('GAMMA') || key.includes('VEGA')) {
        return {
          container: 'bg-blue-50 border-blue-100',
          text: 'text-blue-800',
          icon: '⚡',
          context: 'Exposição'
        };
      }

      return {
        container: 'bg-slate-50 border-slate-100',
        text: 'text-slate-700',
        icon: '',
        context: 'Dados Ativo'
      };
    }
  }
};
</script>

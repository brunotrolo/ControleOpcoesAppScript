<template id="card-summary-template">
  <div :class="isMobile ? 'px-0 bg-transparent border-none' : 'w-full bg-white border border-slate-200 rounded-[32px] p-5 md:p-7 shadow-sm flex flex-col transition-all'"> 
    
    <div class="flex justify-between items-center mb-6" :class="isMobile ? 'px-5' : ''">
      <div>
        <h3 class="text-[var(--m3-on-surface)] text-lg md:text-xl font-bold tracking-tight uppercase flex items-center">
          Sumário
        </h3>
        <p class="text-[var(--m3-on-surface-variant)] text-[9px] md:text-[10px] uppercase tracking-[0.2em] font-bold mt-1">Status</p>
      </div>
      <div v-if="!isLoading" class="px-3 py-1 bg-blue-50 text-blue-700 border border-blue-100 rounded-full text-[8px] font-black uppercase tracking-widest">
        {{ totalActiveOps }} Ativos
      </div>
    </div>

    <div :class="isMobile ? 'flex overflow-x-auto gap-6 px-5 pb-8 hide-scrollbar snap-x snap-mandatory' : 'grid gap-3 md:gap-4'" 
         :style="!isMobile ? gridColsStyle : {}">
      
      <template v-if="isLoading">
        <div v-for="n in 4" :key="'skel-sum-'+n" 
             class="min-w-[280px] snap-center p-5 rounded-[30px] border border-slate-100 bg-slate-50/50 h-32 flex flex-col justify-between animate-pulse">
          <div class="h-3 bg-slate-200 rounded-full w-24"></div>
          <div class="flex flex-col gap-2">
            <div class="h-10 bg-slate-200 rounded-lg w-3/4"></div>
            <div class="h-2 bg-slate-100 rounded-full w-1/2"></div>
          </div>
        </div>
      </template>

      <template v-else>
        <div v-for="field in activeFields" :key="field.key" 
             :class="[
               getPodStyle(field).container,
               /* 🚨 LARGURA DINÂMICA: 'min-w-[280px]' garante o tamanho base, 'w-fit' deixa expandir conforme o número */
               isMobile ? 'min-w-[280px] w-fit flex-shrink-0 snap-center shadow-xl py-5 px-8' : 'p-5 hover:scale-[1.02] shadow-sm'
             ]"
             class="rounded-[30px] border transition-all flex flex-col justify-between h-32"
        >

          <div class="flex justify-between items-start w-full">
            <span class="text-[11px] font-black uppercase tracking-[0.2em] opacity-80 whitespace-nowrap" :class="getPodStyle(field).text">
              {{ field.label }}
            </span>
          </div>

          <div class="flex flex-col w-full">
            <span :class="[ getPodStyle(field).text, isMobile ? 'text-4xl' : 'text-xl' ]" 
                  class="font-mono font-black tracking-tighter whitespace-nowrap leading-none mb-1">
              {{ formatValue(field.value, field.type) }}
            </span>
            
            <span class="text-[10px] font-bold uppercase opacity-50" :class="getPodStyle(field).text">
              {{ getPodStyle(field).context }}
            </span>
          </div>
        </div>
      </template>

    </div>
  </div>
</template>

<script>
const CardSummary = {
  props: {
    summaryData: { type: Array, default: () => [] },
    statsPreCalculados: Object,
    isMobile: Boolean, // 📱 Injetado pelo AppCore
    isLoading: Boolean // 🚀 Injetado pelo AppCore
  },
  template: '#card-summary-template',
  computed: {
    totalActiveOps() {
      return this.statsPreCalculados?.totalOps || 0;
    },
    activeFields() {
      return this.summaryData.filter(f => f.active);
    },
    gridColsStyle() {
      const total = this.activeFields.length || 4;
      
      // Se for mobile, usamos 1 coluna ou 2 dependendo do número de campos
      if (this.isMobile) {
        return { gridTemplateColumns: `repeat(1, minmax(0, 1fr))` };
      }

      // Lógica de Desktop (Máximo 8 colunas)
      let cols = 1;
      const width = window.innerWidth;
      if (width >= 640 && width < 1024) cols = 2;
      if (width >= 1024) cols = total > 8 ? 8 : total;

      return { gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` };
    }
  },
  methods: {
    formatValue(val, type) {
      if (val === 'N/A' || val === undefined || val === null) return '---';
      
      if (type === 'currency' || type === 'moeda') {
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
      }
      if (type === 'percentage' || type === 'percentage') {
        return (val || 0).toFixed(2).replace('.', ',') + '%';
      }
      return new Intl.NumberFormat('pt-BR').format(val || 0);
    },
    
    getPodStyle(field) {
      const key = field.key;
      
      // Família 1: Financeiro (Lucro/Prejuízo)
      if (key.includes('PL_') || key.includes('LUCRO') || key.includes('PERDA') || key.includes('PREMIO') || key.includes('GANHO')) {
        const val = parseFloat(field.value) || 0;
        const isNeg = key.includes('PERDA') || val < 0;
        return {
          container: isNeg ? 'bg-red-50 border-red-100' : 'bg-emerald-50 border-emerald-100',
          text: isNeg ? 'text-red-800' : 'text-emerald-800',
          icon: isNeg ? '' : '',
          context: isNeg ? 'Risco Ativo' : 'Resultado'
        };
      }

      // Família 2: Gregas (Azul Técnico)
      if (['THETA', 'DELTA', 'GAMMA', 'VEGA', 'RHO'].includes(key) || key.includes('THETA') || key.includes('DELTA')) {
        return {
          container: 'bg-blue-50 border-blue-100',
          text: 'text-blue-800',
          icon: '⚡',
          context: 'Exposição'
        };
      }

      // Família 3: Volatilidade e Probabilidade (Âmbar)
      if (key.includes('IV_') || key.includes('VOLATILITY') || key.includes('POE')) {
        return {
          container: 'bg-amber-50 border-amber-100',
          text: 'text-amber-800',
          icon: '🌪️',
          context: 'Probabilidade'
        };
      }

      // Família 4: Tempo e Quantidade (Slate)
      return {
        container: 'bg-slate-50 border-slate-100',
        text: 'text-slate-700',
        icon: key.includes('DTE') ? '' : '',
        context: 'Dados Ativo'
      };
    }
  }
};
</script>

<style>
  .automation-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 1rem 1.25rem;
    background-color: #FFFFFF;
    border: 1px solid var(--app-border);
    border-radius: 16px; /* M3 Medium Shape */
    color: var(--m3-on-surface);
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.2s ease-out;
  }

  .automation-btn:hover {
    /* M3 State Layer: Um toque de cor primária ao passar o mouse */
    background-color: var(--m3-primary);
    border-color: var(--m3-primary);
    color: #FFFFFF;
    transform: scale(1.02);
    box-shadow: 0 4px 12px rgba(0, 90, 193, 0.2);
  }

  .automation-btn:active {
    transform: scale(0.98);
  }
  
  /* Ajuste no container de Logs para o fundo claro */
  log-console {
    filter: invert(1) hue-rotate(180deg); /* Truque rápido para "limpar" o componente de log se ele for escuro */
    opacity: 0.9;
  }
</style>

<script>
window.AutomationView = {
  template: '#automation-view-template',
  props: ['logs'], // Recebe os logs atualizados do AppCore
  data() {
    return { 
      running: false,
      finished: false // Novo estado para controlar a transição visual
    };
  },
  mounted() {
    // Renderiza os novos ícones do painel
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  },
  methods: {

      run(functionName) {
        const self = this;
        self.running = true;
        self.finished = false; // Garante que inicia mostrando "Processando"
        
        google.script.run
          .withSuccessHandler((res) => {
            // 1. Muda para o estado visual de "Concluído"
            self.finished = true;
            
            // 2. Notifica o sistema para atualizar os dados em background
            this.$emit('refresh'); 

            // 3. Fecha o modal automaticamente após 2 segundos
            setTimeout(() => {
              self.running = false;
              self.finished = false;
            }, 3000); 
          })
          .withFailureHandler((err) => {
            self.running = false;
            self.finished = false;
            alert("❌ Erro: " + err); // Mantém o alerta apenas se houver erro real
          })
          [functionName](); 
      }

  }
};
</script>

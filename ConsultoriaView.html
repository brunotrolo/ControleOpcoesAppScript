<script>
const ConsultoriaView = {
  props: {
    operations: { type: Array, default: () => [] },
    isMobile: Boolean, 
    isLoading: Boolean 
  },
  template: '#consultoria-view-template',
  data() {
    return {
      loadingIA: false,
      // 🔥 OTIMIZAÇÃO: Chaves diretas do Tradutor!
      configFields: [
        { key: 'premioPm', label: 'PM', type: 'moeda' },
        { key: 'premioAtual', label: 'Atual', type: 'moeda' },
        { key: 'lucroMaxPct', label: 'Lucro Máx', type: 'pct' },
        { key: 'ganhoMaximo', label: 'Ganho Máx', type: 'moeda' },
        { key: 'plTotalPct', label: 'P/L %', type: 'pct' },
        { key: 'delta', label: 'Delta Δ', type: 'num' },
        { key: 'nocional', label: 'Nocional', type: 'moeda' }
      ]
    }
  },

  computed: {
    // 1. Filtra e ordena (Agora muito mais rápido graças ao vencimentoDate nativo)
    operacoesOrdenadas() {
      if (!this.operations || this.operations.length === 0) return [];
      return [...this.operations]
        .filter(op => String(op.status || '').toUpperCase() === 'ATIVO')
        .sort((a, b) => {
          // O sort agora usa milissegundos em O(1), sem parse manual!
          const dateDiff = (a.vencimentoDate || 0) - (b.vencimentoDate || 0);
          if (dateDiff !== 0) return dateDiff;
          return String(a.ticker || '').localeCompare(String(b.ticker || ''));
        });
    },

    // 2. O QUADRO DE COMANDO (Tático)
    resumoTatico() {
      const resumo = { RECOMPRAR: 0, MANTER: 0, OUTROS: 0 };
      let encontrouAnalise = false;

      this.operacoesOrdenadas.forEach(op => {
        if (op.respostaIA) {
          encontrouAnalise = true;
          const texto = op.respostaIA.toUpperCase();
          if (texto.includes('RECOMPRAR')) resumo.RECOMPRAR++;
          else if (texto.includes('MANTER')) resumo.MANTER++;
          else if (texto.includes('ROLAR') || texto.includes('ASSUMIR')) resumo.OUTROS++;
        }
      });
      return encontrouAnalise ? resumo : {};
    }
  }, 

  watch: {
    operations: {
      immediate: true,
      handler() {
        this.$nextTick(() => { this.recuperarCacheIA(); });
      }
    }
  },

  methods: {
    recuperarCacheIA() {
      const cacheKey = 'cache_auditoria_gemini';
      const cache = JSON.parse(localStorage.getItem(cacheKey) || '{}');
      this.operacoesOrdenadas.forEach(op => {
        const idUnico = `${op.ticker}_${op.codigo}`;
        if (cache[idUnico] && (Date.now() - cache[idUnico].timestamp < 24 * 60 * 60 * 1000)) {
          op.respostaIA = cache[idUnico].texto;
        }
      });
    },

    // --- LÓGICA DE DADOS OTIMIZADA ---
    getDistSpot(op) {
      if (op.strike > 0 && op.spot > 0) {
        const d = ((op.spot / op.strike) - 1) * 100;
        return (d > 0 ? '+' : '') + d.toFixed(1) + '%';
      }
      return '0.0%';
    },

    // --- LÓGICA DE ESTILOS OTIMIZADA ---
    getTipoStyle(op) {
      const tipo = String(op.tipo || '').toUpperCase();
      const direcao = String(op.direcao || '').toUpperCase();
      if (direcao === 'VENDA' && tipo === 'PUT')  return 'bg-amber-100 text-amber-800 border-amber-200';
      if (direcao === 'VENDA' && tipo === 'CALL') return 'bg-indigo-100 text-indigo-800 border-indigo-200';
      if (direcao === 'COMPRA' && tipo === 'PUT')  return 'bg-rose-100 text-rose-800 border-rose-200';
      if (direcao === 'COMPRA' && tipo === 'CALL') return 'bg-emerald-100 text-emerald-800 border-emerald-200';
      return 'bg-slate-100 text-slate-800 border-slate-200';
    },

    getStyleContext(op) {
      const m = String(op.moneynessCode || '').toUpperCase(); // <-- Adicione o 'Code' aqui
      if (m.includes('ITM')) return {
        border: 'border-rose-100', badge: 'bg-rose-100 text-rose-800 border-rose-200',
        footer: 'bg-rose-50 border-rose-100 text-rose-900', icon: '⚠️'
      };
      if (m.includes('OTM')) return {
        border: 'border-emerald-100', badge: 'bg-emerald-100 text-emerald-800 border-emerald-200',
        footer: 'bg-emerald-50 border-emerald-100 text-emerald-900', icon: '✅'
      };
      return {
        border: 'border-blue-100', badge: 'bg-blue-100 text-blue-800 border-blue-200',
        footer: 'bg-blue-50 border-blue-100 text-blue-900', icon: '🔵'
      };
    },

    // --- LÓGICA DO TERMÔMETRO E TENDÊNCIA ---
    getTendenciaStyle(op) {
      const t = String(op.vereditoTendencia || '').toUpperCase();
      if (t.includes('ALTA')) return 'bg-emerald-50 text-emerald-700 border-emerald-100';
      if (t.includes('BAIXA')) return 'bg-rose-50 text-rose-700 border-rose-100';
      return 'bg-slate-50 text-slate-600 border-slate-200';
    },

    getIfrStyle(op) {
      const ifr = String(op.statusIfr || '').toUpperCase();
      if (ifr.includes('SOBRECOMPRADO')) return 'bg-rose-50 text-rose-700 border-rose-100'; 
      if (ifr.includes('SOBREVENDIDO')) return 'bg-emerald-50 text-emerald-700 border-emerald-100'; 
      return 'bg-slate-50 text-slate-600 border-slate-200';
    },

    getBollingerStyle(op) {
      const b = String(op.statusBollinger || '').toUpperCase();
      if (b.includes('DENTRO')) return 'bg-slate-50 text-slate-600 border-slate-200';
      return 'bg-amber-50 text-amber-700 border-amber-100';
    },

    getM200Style(op) {
      const dist = Tradutor.limparNumero(op.distMma200);
      if (dist === 0 && !op.distMma200) return 'bg-slate-50 text-slate-600 border-slate-200';
      if (dist > 15 || dist < -15) return 'bg-amber-50 text-amber-700 border-amber-100'; 
      return 'bg-sky-50 text-sky-700 border-sky-100';
    },

    getDistM200(op) {
      const num = Tradutor.limparNumero(op.distMma200);
      if (num === 0 && !op.distMma200) return 'N/D';
      return (num > 0 ? '+' : '') + num.toFixed(2).replace('.', ',') + '%';
    },

    formatIndicador(val, isCurrency = false) {
      const num = Tradutor.limparNumero(val);
      if (num === 0 && !val) return 'N/D';
      if (isCurrency) return this.formatarBRL(num);
      return num.toFixed(2).replace('.', ',');
    },

    getIfrNumStyle(op) {
      const val = Tradutor.limparNumero(op.ifr14);
      if (val >= 70) return 'text-rose-600 font-black';
      if (val <= 30) return 'text-emerald-600 font-black';
      return 'text-slate-700'; 
    },

    getMeanComparisonStyle(op, meanKey) {
      const spot = op.spot || 0;
      const mean = Tradutor.limparNumero(op[meanKey]);
      if (spot === 0 || mean === 0) return 'text-slate-500';
      if (spot > mean) return 'text-emerald-600 font-black';
      if (spot < mean) return 'text-rose-600 font-black';
      return 'text-slate-700';
    },

    // --- FORMATAÇÕES BÁSICAS ---
    formatValue(field, val) {
      if (val === undefined || val === null) return '-';
      if (field.type === 'moeda') return this.formatarBRL(val);
      if (field.type === 'pct') return val.toFixed(2).replace('.', ',') + ' %';
      return val;
    },
    
    formatarBRL(v) {
      return Tradutor.formatarMoeda(v);
    },

    // --- AÇÃO ---
    solicitarAuditoriaIA() {
      if (this.operacoesOrdenadas.length === 0) return;
      this.loadingIA = true;
      const payload = JSON.parse(JSON.stringify(this.operacoesOrdenadas));

      google.script.run
        .withSuccessHandler((respostaServidor) => {
          this.loadingIA = false;
          if (respostaServidor.success && respostaServidor.data) {
            const cacheKey = 'cache_auditoria_gemini';
            let cacheAtual = JSON.parse(localStorage.getItem(cacheKey) || '{}');

            respostaServidor.data.forEach(item => {
              const op = this.operacoesOrdenadas[item.id];
              if (op) {
                const idUnico = `${op.ticker}_${op.codigo}`;
                op.respostaIA = item.analise;
                cacheAtual[idUnico] = { texto: item.analise, timestamp: Date.now() };
              }
            });
            localStorage.setItem(cacheKey, JSON.stringify(cacheAtual));
          }
        })
        .withFailureHandler((erroCritico) => {
          this.loadingIA = false;
          alert("Erro crítico: O servidor demorou muito a responder.");
        })
        .apiAnalisarOperacoesAtivas(payload); 
    }
  },

  mounted() {
    if(window.lucide) setTimeout(() => lucide.createIcons(), 100);
    this.recuperarCacheIA();
  }
};
</script>

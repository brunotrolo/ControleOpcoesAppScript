<script>

// 🚀 CACHE GLOBAL DE MOEDA PARA ALTA PERFORMANCE
const consultoriaCurrencyFormatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

window.ConsultoriaView = {
  props: {
    db: { type: Object, default: () => ({ cockpit: [], dadosAtivos: [] }) },
    statsPreCalculados: { type: Object, default: () => ({}) },
    isMobile: Boolean,  // 📱 Adicionar esta
    isLoading: Boolean,  // 🚀 Adicionar esta
    historico: { type: Array, default: () => [] }
  },
  template: '#consultoria-view-template',
  data() {
    return {
      loadingIA: false,
      analisesIA: {},
      configFields: [
        { key: 'QUANTIDADE', label: 'Qtd', type: 'num' },
        { key: 'PRÊMIO (PM)', label: 'PM', type: 'moeda' },
        { key: 'PRÊMIO ATUAL', label: 'Atual', type: 'moeda' },
        { key: 'LUCRO MAX', label: 'Lucro Máx', type: 'pct' },
        { key: 'GANHO MÁXIMO', label: 'Ganho Máx', type: 'moeda' },
        { key: 'P/L TOTAL %', label: 'P/L %', type: 'pct' },
        { key: 'DELTA', label: 'Delta Δ', type: 'num' },
        { key: 'NOCIONAL', label: 'Nocional', type: 'moeda' }
      ]
    }
  },


  computed: {

    // 🚀 O componente acha que 'operations' é uma prop, mas é a nossa gaveta de ativas!
    operations() {
      return this.statsPreCalculados?.listaAtivas || [];
    },

    // 1. Filtra e ordena os cards na tela
    operacoesOrdenadas() {
      const cockpit = this.db.cockpit || [];
      
      // 🚀 REDUNDÂNCIA DE SEGURANÇA: Tenta a gaveta nova, se não tiver, tenta a antiga.
      const baseTecnica = (this.db.dadosTendencia && this.db.dadosTendencia.length > 0) 
                          ? this.db.dadosTendencia 
                          : (this.db.dadosAtivos || []);

      return cockpit
        .filter(op => {
          const st = String(this.getVal(op, 'STATUS')).toUpperCase();
          return st === 'ATIVO' || st === 'ABERTO';
        })
        .map(op => {
          const ticker = String(this.getVal(op, 'TICKER')).trim().toUpperCase();
          const codigo = String(this.getVal(op, 'CÓDIGO')).trim().toUpperCase();
          
          // Cria um ID único para cada card (ex: CSNA3_CSNAO928)
          const idUnico = `${ticker}_${codigo}`;
          
          // Encontra os dados técnicos (IFR, Médias, Tendência)
          const infoTecnica = baseTecnica.find(t => {
            const tTick = String(t.tickerAtivo || t.ticker || t.TICKER || "").trim().toUpperCase();
            return tTick === ticker && ticker !== "";
          }) || {};

          // 🚀 Injeta a resposta da IA armazenada no nosso Cofre
          const respostaIA = this.analisesIA[idUnico] || null;

          // Retorna a fusão de todos os dados
          return { ...op, ...infoTecnica, respostaIA, idUnico };
        })
        .sort((a, b) => {
          // 1. Prioridade Máxima: Vencimento (O mais próximo/recente primeiro)
          const dataA = this._parseDate(this.getVal(a, 'VENCIMENTO'));
          const dataB = this._parseDate(this.getVal(b, 'VENCIMENTO'));
          
          if (dataA !== dataB) {
            return dataA - dataB; // Ordem crescente de data
          }
          
          // 2. Segunda Prioridade: Ticker (Ordem Alfabética A-Z)
          const tickA = String(this.getVal(a, 'TICKER')).toUpperCase();
          const tickB = String(this.getVal(b, 'TICKER')).toUpperCase();
          
          if (tickA !== tickB) {
            return tickA.localeCompare(tickB);
          }
          
          // 3. Terceira Prioridade: Código da Opção (Ordem Alfabética A-Z)
          const codA = String(this.getVal(a, 'CÓDIGO')).toUpperCase();
          const codB = String(this.getVal(b, 'CÓDIGO')).toUpperCase();
          
          return codA.localeCompare(codB);
        });
    },

    // 2. O QUADRO DE COMANDO (Agora no lugar certo!)
    resumoTatico() {
      const resumo = { RECOMPRAR: 0, MANTER: 0, OUTROS: 0 };
      let encontrouAnalise = false;

      this.operacoesOrdenadas.forEach(op => {
        if (op.respostaIA) {
          encontrouAnalise = true;
          const texto = op.respostaIA.toUpperCase();
          
          if (texto.includes('RECOMPRAR')) resumo.RECOMPRAR++;
          else if (texto.includes('MANTER')) resumo.MANTER++;
          else if (texto.includes('ROLAR') || texto.includes('ASSUMIR')) resumo.OUTROS++;
        }
      });

      return encontrouAnalise ? resumo : {};
    }
  }, // <--- Fim do Computed

  watch: {
    // Sincroniza o cache sempre que os dados mudarem
    operations: {
      immediate: true,
      handler() {
        this.$nextTick(() => {
          this.recuperarCacheIA();
        });
      }
    }
  },


  methods: {

    recuperarCacheIA() {
      const cacheKey = 'cache_auditoria_gemini';
      const cache = JSON.parse(localStorage.getItem(cacheKey) || '{}');
      
      const novasAnalises = { ...this.analisesIA };
      
      // Lê o cache e joga para o dicionário reativo
      Object.keys(cache).forEach(idUnico => {
        // Se existe análise no cache e ela tem menos de 24 horas, restaura
        if (Date.now() - cache[idUnico].timestamp < 24 * 60 * 60 * 1000) {
          novasAnalises[idUnico] = cache[idUnico].texto;
        }
      });
      
      // Atualiza a tela instantaneamente
      this.analisesIA = novasAnalises;
    },

    // --- LÓGICA DE DADOS (Adaptada para receber 'op' como parâmetro) ---
    // Traduz a chave do Design para a chave do Backend

    getVal(op, key) {
      if (!op) return '';
      const search = String(key || '').toUpperCase().trim();
      const keys = Object.keys(op);

      // 1. Mapa de Equivalência (View Label -> Tradutor Key)
      const mapaV5 = {
        'TICKER': 'tickerAtivo',
        'CÓDIGO': 'simboloOpcao',
        'CODIGO': 'simboloOpcao',
        'CÓDIGO OPÇÃO': 'simboloOpcao',
        'SPOT': 'spot',
        'STRIKE': 'strike',
        'QUANTIDADE': 'quantidade',
        'QTD': 'quantidade',
        'VENCIMENTO': 'dataVencimento',
        'VENDA/COMPRA': 'direcaoTrade',
        'DIREÇÃO': 'direcaoTrade',
        'PM': 'premioMedio',
        'PRÊMIO (PM)': 'premioMedio',
        'ATUAL': 'premioAtual',
        'PRÊMIO ATUAL': 'premioAtual',
        'LUCRO MAX': 'potencialLucroPct',
        'LUCRO MÁX': 'potencialLucroPct',
        'GANHO MAX': 'ganhoMaximo',
        'GANHO MAXIMO': 'ganhoMaximo',
        'GANHO MÁXIMO': 'ganhoMaximo',
        'P/L %': 'plTotalPct',
        'P/L TOTAL %': 'plTotalPct',
        'P/L TOTAL': 'plTotalUnitario',
        'NOCIONAL': 'nocional',
        'DELTA': 'delta',
        'IFR14': 'ifr14',
        'MONEYNESS': 'moneyness',
        'STATUS': 'status',
        'DTE': 'dteCorridos',

        // --- 🚀 INDICADORES TÉCNICOS (O FIM DO N/D) ---
        'VEREDITO_TENDENCIA': 'vereditoTendencia',
        'STATUS_IFR': 'statusIfr',
        'STATUS_BOLLINGER': 'statusBollinger',
        'IFR14': 'ifr14',
        'B. SUP': 'bandaSup',
        'BANDA_SUP': 'bandaSup',
        'B. INF': 'bandaInf',
        'BANDA_INF': 'bandaInf',
        'LARGURA': 'larguraBanda',
        'LARGURA_BANDA': 'larguraBanda',
        'MMA5': 'mma5',
        'MMA20': 'mma20',
        'MMA200': 'mma200',
        'DIST. M200': 'distMma200',
        'DIST_MMA200': 'distMma200',
        'VOL_RELATIVO': 'volRelativo'

      };

      // Tenta tradução direta
      if (mapaV5[search] && op[mapaV5[search]] !== undefined) return op[mapaV5[search]];

      // 2. Normalização Agressiva (Remove acentos, espaços, parênteses e símbolos)
      const norm = (s) => String(s || '').normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toUpperCase()
        .replace(/[\(\)\s\_\/\%\.\,]/g, "");
        
      const target = norm(search);

      // Busca por chave normalizada nas propriedades do objeto
      const foundKey = keys.find(k => norm(k) === target || norm(k).includes(target));
      return foundKey ? op[foundKey] : '';
    },
    
    getValExato(op, targetKey) {
      // Delegamos a inteligência para o getVal principal, que possui o mapaV5
      return this.getVal(op, targetKey);
    },

    getDistSpot(op) {
      const strike = this._parseNum(this.getVal(op, 'STRIKE'));
      const spot = this._parseNum(this.getVal(op, 'SPOT'));
      if (strike > 0 && spot > 0) {
        const d = ((spot / strike) - 1) * 100;
        return (d > 0 ? '+' : '') + d.toFixed(1) + '%';
      }
      return '0.0%';
    },

    // --- LÓGICA DE ESTILOS ---
    isVenda(op) {
      const v = String(this.getVal(op, 'VENDA/COMPRA') || '').toUpperCase();
      return v.includes('VENDA');
    },

    getTipoStyle(op) {
      const tipo = String(this.getVal(op, 'Tipo')).toUpperCase();
      const venda = this.isVenda(op);
      if (venda && tipo.includes('PUT'))   return 'bg-amber-100 text-amber-800 border-amber-200';
      if (venda && tipo.includes('CALL'))  return 'bg-indigo-100 text-indigo-800 border-indigo-200';
      if (!venda && tipo.includes('PUT'))  return 'bg-rose-100 text-rose-800 border-rose-200';
      if (!venda && tipo.includes('CALL')) return 'bg-emerald-100 text-emerald-800 border-emerald-200';
      return 'bg-slate-100 text-slate-800 border-slate-200';
    },

    getStyleContext(op) {
      const m = String(this.getVal(op, 'MONEYNESS')).toUpperCase();
      if (m.includes('ITM')) return {
        border: 'border-red-100', badge: 'bg-red-100 text-red-800 border-red-200',
        footer: 'bg-red-50 border-red-100 text-red-900', icon: '⚠️'
      };
      if (m.includes('OTM')) return {
        border: 'border-emerald-100', badge: 'bg-emerald-100 text-emerald-800 border-emerald-200',
        footer: 'bg-emerald-50 border-emerald-100 text-emerald-900', icon: '✅'
      };
      return {
        border: 'border-blue-100', badge: 'bg-blue-100 text-blue-800 border-blue-200',
        footer: 'bg-blue-50 border-blue-100 text-blue-900', icon: '🔵'
      };
    },

    getPlClass(op) {
      const val = this._parseNum(this.getVal(op, 'P/L TOTAL'));
      return val >= 0 ? 'text-emerald-600' : 'text-red-600';
    },

    // =======================================================
    // --- LÓGICA DO TERMÔMETRO E TENDÊNCIA (COMPLETA) ---
    // =======================================================
    
    // 1. Cores para Status de Tendência
    getTendenciaStyle(op) {
      const t = String(this.getVal(op, 'Veredito_Tendencia')).toUpperCase();
      if (t.includes('ALTA')) return 'bg-emerald-50 text-emerald-700 border-emerald-100';
      if (t.includes('BAIXA')) return 'bg-rose-50 text-rose-700 border-rose-100';
      return 'bg-slate-50 text-slate-600 border-slate-200';
    },

    // 2. Cores para Status do IFR
    getIfrStyle(op) {
      const ifr = String(this.getVal(op, 'Status_IFR')).toUpperCase();
      if (ifr.includes('SOBRECOMPRADO')) return 'bg-rose-50 text-rose-700 border-rose-100'; // Risco de queda
      if (ifr.includes('SOBREVENDIDO')) return 'bg-emerald-50 text-emerald-700 border-emerald-100'; // Oportunidade
      return 'bg-slate-50 text-slate-600 border-slate-200';
    },

    // 3. Cores para Status de Bollinger
    getBollingerStyle(op) {
      const b = String(this.getVal(op, 'Status_Bollinger')).toUpperCase();
      if (b.includes('DENTRO')) return 'bg-slate-50 text-slate-600 border-slate-200';
      // Se rompeu as bandas, é um evento de alta volatilidade (Amarelo Alerta)
      return 'bg-amber-50 text-amber-700 border-amber-100';
    },

    // 4. Cores e Formatação para Distância da Média 200
    getM200Style(op) {
      const distStr = this.getVal(op, 'Dist_MMA200');
      if (!distStr && distStr !== 0) return 'bg-slate-50 text-slate-600 border-slate-200';
      const dist = parseFloat(String(distStr).replace(',', '.'));
      if (dist > 15 || dist < -15) return 'bg-amber-50 text-amber-700 border-amber-100'; // Muito esticado
      return 'bg-sky-50 text-sky-700 border-sky-100';
    },

    getDistM200(op) {
      const dist = this.getVal(op, 'Dist_MMA200');
      if (!dist && dist !== 0) return 'N/D';
      const num = parseFloat(String(dist).replace(',', '.'));
      return (num > 0 ? '+' : '') + num.toFixed(2).replace('.', ',') + '%';
    },

    // 5. Formatador Universal para os Novos Indicadores Numéricos
    formatIndicador(op, key, isCurrency = false) {
      const val = this.getVal(op, key);
      
      // Se for vazio ou indefinido (mas permitindo o Zero)
      if (val === undefined || val === null || val === '') return 'N/D';
      
      // Usa o parser inteligente que não destrói os números decimais nativos
      const num = this._parseNum(val);
      
      // Se não for possível converter num número válido, devolve o que veio
      if (isNaN(num)) return val;

      // Se for as Médias (MMA5, MMA20, MMA200) ou Bandas, formata como Moeda
      if (isCurrency) {
        return consultoriaCurrencyFormatter.format(num);
      }
      
      // Se for IFR14, Vol_Relativo ou Largura da Banda, usa 2 casas decimais no padrão PT-BR
      return num.toFixed(2).replace('.', ',');
    },


    // --- LÓGICA DE FORMATAÇÃO ---
    _parseNum(v) {
      if (typeof v === 'number') return v;
      const clean = String(v || '0').replace(/[R$.%]/g, '').replace(',', '.').trim();
      return parseFloat(clean) || 0;
    },
    
    _parseDate(val) {
      if (!val) return 0;
      const d = (val instanceof Date) ? val : new Date(val);
      return isNaN(d.getTime()) ? 0 : d.getTime();
    },

    formatValue(field, val) {
      if (val === undefined || val === null || val === '') return '-';
      
      const n = this._parseNum(val);
      
      if (field.type === 'moeda') return this.formatMoeda(val); // Passamos o val original para evitar perder precisão antes do parser interno
      if (field.key === 'DELTA') return n.toFixed(4);
      
      // Como o Tradutor entrega 1.55 para 155%, nós sempre multiplicamos por 100 aqui
      if (field.type === 'pct') {
        return (n * 100).toFixed(2).replace('.', ',') + ' %';
      }
      
      return val;
    },
    
    formatMoeda(val) {
      const n = this._parseNum(val);
      // Se o valor for zero e o campo for PM ou Lucro, pode ser que o dado não existia
      if (n === 0 && val === undefined) return "-";
      
      return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL',
        minimumFractionDigits: 2
      }).format(n);
    },


    // --- AÇÃO ---
    solicitarAuditoriaIA() {
      if (this.operacoesOrdenadas.length === 0) return;
      
      this.loadingIA = true;
      // LOG REMOVIDO PARA PERFORMANCE

      // 1. Prepara o pacote (Remove a reatividade do Vue para viajar limpo pela rede)
      const payload = JSON.parse(JSON.stringify(this.operacoesOrdenadas));

      // 2. Dispara pelo túnel oficial do Google Apps Script
      google.script.run

        .withSuccessHandler((respostaServidor) => {
          this.loadingIA = false;
          if (respostaServidor.success && respostaServidor.data) {
            
            const cacheKey = 'cache_auditoria_gemini';
            let cacheAtual = JSON.parse(localStorage.getItem(cacheKey) || '{}');
            const novasAnalises = { ...this.analisesIA };

            respostaServidor.data.forEach(item => {
              // Pega a operação que foi analisada usando o index
              const op = this.operacoesOrdenadas[item.id];
              if (op) {
                const idUnico = op.idUnico;
                
                // 🚀 Salva no Cofre reativo
                novasAnalises[idUnico] = item.analise;
                
                // Salva no LocalStorage
                cacheAtual[idUnico] = {
                  texto: item.analise,
                  timestamp: Date.now()
                };
              }
            });

            // Atualiza as variáveis, forçando a tela a renderizar os textos
            this.analisesIA = novasAnalises;
            localStorage.setItem(cacheKey, JSON.stringify(cacheAtual));
          }
        })

        .withFailureHandler((erroCritico) => {
          this.loadingIA = false;
          // Deixamos o alert, mas removemos o console.error que trava a UI
          alert("Erro crítico: O servidor demorou muito a responder ou está indisponível.");
        })
        .apiAnalisarOperacoesAtivas(payload); // Chama a função do seu novo arquivo 011!
    },


    // =======================================================
    // --- NOVAS CORES PARA OS VALORES TÉCNICOS ---
    // =======================================================

    // 1. Colore o número cru do IFR (Ex: 75 fica vermelho, 25 fica verde)
    getIfrNumStyle(op) {
        const val = this._parseNum(this.getVal(op, 'IFR14'));
        // Usamos 'font-black' para destacar bem o número colorido
        if (val >= 70) return 'text-rose-600 font-black';
        if (val <= 30) return 'text-emerald-600 font-black';
        return 'text-slate-700'; // Cor neutra padrão
    },

    // 2. Compara o Preço Spot com a Média (M20, M200)
    getMeanComparisonStyle(op, meanKey) {
        const spot = this._parseNum(this.getVal(op, 'Spot'));
        const mean = this._parseNum(this.getVal(op, meanKey));

        if (spot === 0 || mean === 0) return 'text-slate-500';

        // Se o preço está ACIMA da média, é um sinal de força (Verde)
        if (spot > mean) return 'text-emerald-600 font-black';
        // Se o preço está ABAIXO da média, é um sinal de fraqueza (Vermelho)
        if (spot < mean) return 'text-rose-600 font-black';
        
        return 'text-slate-700';
    },

    // --- DENTRO DE methods: { ... } na ConsultoriaView.html ---

    formatData(val) {
      if (!val || val === "") return "-";
      
      // Tenta converter para objeto Date caso receba string ou timestamp
      const d = (val instanceof Date) ? val : new Date(val);
      
      // Se for uma data válida, formata para o padrão brasileiro
      if (!isNaN(d.getTime())) {
        return d.toLocaleDateString('pt-BR', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric'
        });
      }
      
      return val; // Fallback para o valor original se a conversão falhar
    }

  },


  mounted() {
    if(window.lucide) setTimeout(() => lucide.createIcons(), 100);
    // Recupera as análises do LocalStorage se existirem
    this.recuperarCacheIA();
}

};
</script>
